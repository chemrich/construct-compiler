<?xml version="1.0" encoding="UTF-8"?>
<svg width="550" height="550" viewBox="0 0 550 550" xmlns="http://www.w3.org/2000/svg" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <!-- Center text -->
  <text x="275" y="258" font-size="18" font-weight="700" fill="#1a1a2e" text-anchor="middle">pET-28b(+)</text>
  <text x="275" y="280" font-size="14" fill="#555" text-anchor="middle">5,368 bp</text>

  <!-- Circular plasmid ring — drawn as colored arcs -->
  <!-- Center: 275,275  Radius: 170 -->
  <!-- Angles measured from 12 o'clock (top), clockwise -->
  <!-- Segment layout (approximate, totaling 360°): -->
  <!--   T7lac(12°) + RBS(4°) + His6(4°) + Thrombin(4°) = 24° upstream MCS -->
  <!--   INSERT = 140° (the big green segment) -->
  <!--   T7term(20°) + f1ori(30°) + KanR(50°) + lacI(40°) + pBR322ori(30°) = 170° backbone -->
  <!--   Total: 24+140+20+30+50+40+30+26(gap)=360° -->

  <!-- Helper: arc from angle a1 to a2 (degrees from top, clockwise) -->
  <!-- x = cx + r*sin(a), y = cy - r*cos(a) -->

  <!-- T7lac promoter: 0° to 12° -->
  <path d="M 275 105 A 170 170 0 0 1 310.3 107.7" stroke="#43a047" stroke-width="26" fill="none"/>

  <!-- RBS: 12° to 16° -->
  <path d="M 310.3 107.7 A 170 170 0 0 1 321.8 110.5" stroke="#1e88e5" stroke-width="26" fill="none"/>

  <!-- His6: 16° to 20° -->
  <path d="M 321.8 110.5 A 170 170 0 0 1 333.1 114.3" stroke="#fb8c00" stroke-width="26" fill="none"/>

  <!-- Thrombin: 20° to 24° -->
  <path d="M 333.1 114.3 A 170 170 0 0 1 344.1 119.1" stroke="#f4511e" stroke-width="26" fill="none"/>

  <!-- INSERT: 24° to 164° (140° span — large-arc flag=0 since <180°) -->
  <path d="M 344.1 119.1 A 170 170 0 0 1 229.5 432.7" stroke="#66bb6a" stroke-width="26" fill="none"/>

  <!-- T7 terminator: 164° to 184° -->
  <path d="M 229.5 432.7 A 170 170 0 0 1 193.5 439.2" stroke="#e53935" stroke-width="26" fill="none"/>

  <!-- f1 ori: 184° to 214° -->
  <path d="M 193.5 439.2 A 170 170 0 0 1 127.6 397.9" stroke="#ab47bc" stroke-width="26" fill="none"/>

  <!-- Kanamycin resistance: 214° to 264° -->
  <path d="M 127.6 397.9 A 170 170 0 0 1 107.3 254.6" stroke="#e53935" stroke-width="26" fill="none"/>

  <!-- lacI repressor: 264° to 304° -->
  <path d="M 107.3 254.6 A 170 170 0 0 1 177.3 132.5" stroke="#26a69a" stroke-width="26" fill="none"/>

  <!-- pBR322 ori: 304° to 340° -->
  <path d="M 177.3 132.5 A 170 170 0 0 1 253.3 106.5" stroke="#42a5f5" stroke-width="26" fill="none"/>

  <!-- Gap / connector: 340° to 360° -->
  <path d="M 253.3 106.5 A 170 170 0 0 1 275 105" stroke="#90a4ae" stroke-width="26" fill="none"/>

  <!-- Labels with leader lines -->
  <!-- T7lac -->
  <line x1="293" y1="100" x2="293" y2="62" stroke="#aaa" stroke-width="0.8"/>
  <text x="293" y="57" font-size="10" fill="#2e7d32" text-anchor="middle" font-weight="600">T7lac</text>

  <!-- RBS + His6 + Thrombin cluster -->
  <line x1="338" y1="112" x2="420" y2="65" stroke="#aaa" stroke-width="0.8"/>
  <text x="422" y="57" font-size="9" fill="#1565c0" text-anchor="start">RBS</text>
  <text x="422" y="69" font-size="9" fill="#e65100" text-anchor="start">N-His₆</text>
  <text x="422" y="81" font-size="9" fill="#d84315" text-anchor="start">Thrombin</text>

  <!-- INSERT label (on the large green segment) -->
  <text x="390" y="290" font-size="14" font-weight="700" fill="#2e7d32">INSERT</text>
  <text x="390" y="305" font-size="9" fill="#555">His·TEV·MBP·mEGFP</text>
  <text x="390" y="317" font-size="9" fill="#555">spacer·RBS·mScarlet</text>

  <!-- T7 term -->
  <line x1="210" y1="440" x2="210" y2="480" stroke="#aaa" stroke-width="0.8"/>
  <text x="210" y="492" font-size="9" fill="#c62828" text-anchor="middle">T7 term</text>

  <!-- f1 ori -->
  <line x1="130" y1="415" x2="68" y2="440" stroke="#aaa" stroke-width="0.8"/>
  <text x="65" y="453" font-size="9" fill="#7b1fa2" text-anchor="end">f1 ori ←</text>

  <!-- Kanamycin resistance -->
  <line x1="107" y1="320" x2="50" y2="320" stroke="#aaa" stroke-width="0.8"/>
  <text x="47" y="316" font-size="10" fill="#c62828" text-anchor="end" font-weight="600">Kan(R) ←</text>

  <!-- lacI -->
  <line x1="130" y1="185" x2="60" y2="165" stroke="#aaa" stroke-width="0.8"/>
  <text x="57" y="162" font-size="9" fill="#00695c" text-anchor="end">lacI ←</text>

  <!-- pBR322 ori -->
  <line x1="215" y1="112" x2="165" y2="62" stroke="#aaa" stroke-width="0.8"/>
  <text x="162" y="57" font-size="9" fill="#1565c0" text-anchor="end">pBR322 ori</text>

  <!-- Direction arrows for counterclockwise features -->
  <!-- Small "←" indicators are in the label text -->

  <!-- Legend box -->
  <rect x="30" y="505" width="490" height="32" rx="6" fill="#fafafa" stroke="#ddd" stroke-width="1"/>
  <text x="275" y="525" font-size="10" fill="#444" text-anchor="middle">← = counterclockwise (pBR322 topology: Kan(R) and lacI run reverse)</text>
</svg>
