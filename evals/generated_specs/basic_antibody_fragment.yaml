```yaml
construct:
  name: "fab_fragment_expression_vector"
  host: e_coli_bl21_de3

  backbone:
    catalog_vector: "pET-28b(+)"

  cassette:
    - promoter: T7lac

    - cistron:
        label: heavy_chain
        expression: high
        chain:
          - tag: 6xHis
          - cleavage_site: TEV
          - gene:
              id: P01857  # Human IgG1 heavy chain constant region (Fab portion)
              source: uniprot

    - spacer: 30

    - cistron:
        label: light_chain
        expression: high
        fused: false
        gene:
          id: P01834  # Human kappa light chain constant region
          source: uniprot

    - terminator: rrnB_T1

  constraints:
    assembly: golden_gate
    enzyme: BsaI
    codon_optimization: local
    gc_window: [0.35, 0.65]
    max_homopolymer: 6

  synthesis:
    vendor: twist
    budget_per_gene: 400
    max_turnaround_days: 21
