construct:
  name: "His_GFP_expression"
  host: e_coli_bl21

  backbone:
    resistance: kanamycin
    ori: pBR322

  cassette:
    - promoter: T7lac

    - cistron:
        label: target
        expression: high
        chain:
          - tag: 6xHis
          - gene:
              id: mEGFP
              source: fpbase

    - terminator: rrnB_T1

  constraints:
    assembly: golden_gate
    enzyme: BsaI
    codon_optimization: local
