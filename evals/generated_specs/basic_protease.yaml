```yaml
construct:
  name: serine_protease_expression
  host: e_coli

  backbone:
    catalog_vector: "pET-28b(+)"

  cassette:
    - promoter: T7lac

    - cistron:
        label: serine_protease
        expression: medium
        chain:
          - tag: 6xHis
          - cleavage_site: TEV
          - gene:
              id: P00766  # Trypsin
              source: uniprot

    - terminator: rrnB_T1

  constraints:
    assembly: golden_gate
    enzyme: BsaI
    codon_optimization: local
    gc_window: [0.35, 0.65]
    max_homopolymer: 6

  synthesis:
    vendor: twist
    budget_per_gene: 400
    max_turnaround_days: 21
