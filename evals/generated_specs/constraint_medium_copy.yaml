```yaml
construct:
  name: bicistronic_mEGFP_mScarlet_medium_copy
  host: e_coli

  backbone:
    resistance: kanamycin
    ori: p15A  # medium-copy origin for balanced expression
    source: addgene

  cassette:
    - promoter: T7lac

    - cistron:
        label: mEGFP
        expression: medium
        gene:
          id: mEGFP
          source: fpbase

    - spacer: 30

    - cistron:
        label: mScarlet
        expression: medium
        fused: false
        gene:
          id: mScarlet
          source: fpbase

    - terminator: rrnB_T1

  constraints:
    assembly: golden_gate
    enzyme: BsaI
    codon_optimization: local
    gc_window: [0.35, 0.65]
    max_homopolymer: 6

  synthesis:
    vendor: twist
    budget_per_gene: 400
    max_turnaround_days: 21
```