```yaml
construct:
  name: "counter_selectable_expression_vector"
  host: e_coli

  backbone:
    resistance: none
    counter_selectable: sacB  # sucrose counter-selection
    ori: pBR322
    source: addgene

  cassette:
    - promoter: T7lac

    - cistron:
        label: target
        expression: high
        chain:
          - tag: 6xHis
          - gene:
              id: mEGFP
              source: fpbase

    - terminator: rrnB_T1

  constraints:
    assembly: golden_gate
    enzyme: BsaI
    codon_optimization: local
    gc_window: [0.35, 0.65]
    max_homopolymer: 6

  synthesis:
    vendor: twist
    budget_per_gene: 400
    max_turnaround_days: 21
```