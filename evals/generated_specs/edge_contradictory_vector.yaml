```yaml
construct:
  name: "CHO_expression_vector"
  host: CHO

  backbone:
    catalog_vector: "pTwist CMV"  # Using mammalian vector instead of pET-28a(+) for CHO compatibility
    
  cassette:
    - promoter: CMV

    - cistron:
        label: target
        expression: high
        chain:
          - tag: 6xHis
          - gene:
              id: mEGFP
              source: fpbase

    - terminator: rrnB_T1

  constraints:
    assembly: golden_gate
    enzyme: BsaI
    codon_optimization: local
    gc_window: [0.35, 0.65]
    max_homopolymer: 6

  synthesis:
    vendor: twist
    budget_per_gene: 400
    max_turnaround_days: 21
```