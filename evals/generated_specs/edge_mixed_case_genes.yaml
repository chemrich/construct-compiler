```yaml
construct:
  name: triple_fluorescent_protein_expression
  host: e_coli

  backbone:
    catalog_vector: "pET-28b(+)"

  cassette:
    - promoter: T7lac

    - cistron:
        label: gfp
        expression: high
        gene:
          id: mEGFP
          source: fpbase

    - spacer: 30

    - cistron:
        label: scarlet
        expression: high
        fused: false
        gene:
          id: mScarlet
          source: fpbase

    - spacer: 30

    - cistron:
        label: neongreen
        expression: high
        fused: false
        gene:
          id: mNeonGreen
          source: fpbase

    - terminator: rrnB_T1

  constraints:
    assembly: golden_gate
    enzyme: BsaI
    codon_optimization: local
    gc_window: [0.35, 0.65]
    max_homopolymer: 6

  synthesis:
    vendor: twist
    budget_per_gene: 400
    max_turnaround_days: 21
```