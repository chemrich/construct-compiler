```yaml
construct:
  name: "mEGFP_beta_promoter"
  host: e_coli

  backbone:
    catalog_vector: "pET-28b(+)"

  cassette:
    - promoter: T7  # Using T7 as closest equivalent to super-strong beta promoter

    - cistron:
        label: target
        expression: high
        gene:
          id: mEGFP
          source: fpbase

    - terminator: rrnB_T1

  constraints:
    assembly: golden_gate
    enzyme: BsaI
    codon_optimization: local
    gc_window: [0.35, 0.65]
    max_homopolymer: 6

  synthesis:
    vendor: twist
    budget_per_gene: 400
    max_turnaround_days: 21
```