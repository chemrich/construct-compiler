```yaml
construct:
  name: "dual_promoter_lentiviral_mEGFP_mScarlet"
  host: HEK293

  backbone:
    catalog_vector: "pTwist CMV"

  cassette:
    - promoter: CMV

    - cistron:
        label: egfp_reporter
        expression: high
        gene:
          id: mEGFP
          source: fpbase

    - promoter: EF1_alpha

    - cistron:
        label: scarlet_reporter
        expression: medium
        gene:
          id: mScarlet
          source: fpbase

    - terminator: rrnB_T1

  constraints:
    assembly: golden_gate
    enzyme: BsaI
    codon_optimization: local
    gc_window: [0.35, 0.65]
    max_homopolymer: 6

  synthesis:
    vendor: twist
    budget_per_gene: 400
    max_turnaround_days: 21
