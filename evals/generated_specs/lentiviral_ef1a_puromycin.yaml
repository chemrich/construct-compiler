```yaml
construct:
  name: lentiviral_EF1a_mEGFP_puromycin
  host: HEK293

  backbone:
    catalog_vector: "pLenti-GIII-CMV"  # Will be modified to use EF1a instead
    # Custom lentiviral backbone with puromycin resistance

  cassette:
    - promoter: EF1_alpha

    - cistron:
        label: reporter
        expression: medium
        gene:
          id: mEGFP
          source: fpbase

    - spacer: 30

    - promoter: CMV  # For puromycin resistance gene

    - cistron:
        label: selection
        expression: medium
        fused: false
        gene:
          id: P2A_puromycin_resistance
          # Puromycin N-acetyltransferase for selection

    - terminator: rrnB_T1

  constraints:
    assembly: golden_gate
    enzyme: BsaI
    codon_optimization: local
    gc_window: [0.35, 0.65]
    max_homopolymer: 6

  synthesis:
    vendor: twist
    budget_per_gene: 600
    max_turnaround_days: 21
```