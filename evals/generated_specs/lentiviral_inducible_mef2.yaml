```yaml
construct:
  name: "lentiviral_MEF2_mEGFP_myocyte"
  host: HEK293

  backbone:
    catalog_vector: "pTwist Lenti"

  cassette:
    - promoter: MEF2  # muscle-specific promoter for myocyte expression
    
    - cistron:
        label: reporter
        expression: medium
        gene:
          id: mEGFP
          source: fpbase

    - terminator: SV40_polyA

  constraints:
    assembly: golden_gate
    enzyme: BsaI
    codon_optimization: local
    gc_window: [0.35, 0.65]
    max_homopolymer: 6

  synthesis:
    vendor: twist
    budget_per_gene: 400
    max_turnaround_days: 21
```