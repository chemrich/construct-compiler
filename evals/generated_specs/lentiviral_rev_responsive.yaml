```yaml
construct:
  name: "lentiviral_RRE_packaging"
  host: HEK293

  backbone:
    catalog_vector: "pTwist CMV"

  cassette:
    - promoter: CMV

    - cistron:
        label: target
        expression: high
        gene:
          id: mEGFP
          source: fpbase

    - spacer: 200

    - element:
        type: RRE
        description: "Rev-responsive element for enhanced lentiviral packaging and nuclear export"

    - terminator: SV40_polyA

  constraints:
    assembly: golden_gate
    enzyme: BsaI
    codon_optimization: local
    gc_window: [0.35, 0.65]
    max_homopolymer: 6

  synthesis:
    vendor: twist
    budget_per_gene: 400
    max_turnaround_days: 21
