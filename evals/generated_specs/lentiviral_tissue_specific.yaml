```yaml
construct:
  name: lentiviral_neuron_specific_expression
  host: HEK293

  backbone:
    catalog_vector: "pTwist CMV"
    # Using CMV backbone but will replace with neuron-specific promoter

  cassette:
    - promoter: CMV  # Placeholder - would need custom neuron-specific promoter like Synapsin-1
      # Note: True neuron-specific promoters like Synapsin-1 or CaMKII would require custom synthesis

    - cistron:
        label: target
        expression: medium
        chain:
          - tag: FLAG
          - gene:
              id: mEGFP
              source: fpbase

    - terminator: rrnB_T1

  constraints:
    assembly: golden_gate
    enzyme: BsaI
    codon_optimization: local
    gc_window: [0.35, 0.65]
    max_homopolymer: 6

  synthesis:
    vendor: twist
    budget_per_gene: 600
    max_turnaround_days: 28
```