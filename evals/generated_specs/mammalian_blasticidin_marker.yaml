```yaml
construct:
  name: "mammalian_blasticidin_expression"
  host: HEK293

  backbone:
    catalog_vector: "pTwist CMV"
    # Note: Using standard CMV vector, blasticidin resistance will be added via custom backbone
    resistance: blasticidin
    ori: pUC
    source: twist

  cassette:
    - promoter: CMV

    - cistron:
        label: target
        expression: high
        gene:
          id: mEGFP
          source: fpbase

    - terminator: SV40_polyA

  constraints:
    assembly: golden_gate
    enzyme: BsaI
    codon_optimization: local
    gc_window: [0.35, 0.65]
    max_homopolymer: 6

  synthesis:
    vendor: twist
    budget_per_gene: 400
    max_turnaround_days: 21
```