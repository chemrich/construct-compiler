```yaml
construct:
  name: cumate_inducible_mammalian_expression
  host: HEK293

  backbone:
    catalog_vector: "pTwist CMV"

  cassette:
    - promoter: CMV_CuO  # CMV promoter with cumate operator sequences
      
    - cistron:
        label: target_protein
        expression: high
        gene:
          id: mEGFP
          source: fpbase

    - terminator: SV40_polyA

  constraints:
    assembly: golden_gate
    enzyme: BsaI
    codon_optimization: local
    gc_window: [0.35, 0.65]
    max_homopolymer: 6

  synthesis:
    vendor: twist
    budget_per_gene: 400
    max_turnaround_days: 21
