```yaml
construct:
  name: "kozak_optimized_reporter"
  host: HEK293

  backbone:
    catalog_vector: "pTwist CMV"

  cassette:
    - promoter: CMV

    - cistron:
        label: reporter
        expression: high
        chain:
          - gene:
              id: mEGFP
              source: fpbase
              kozak_sequence: GCCGCCATGG  # Optimal Kozak consensus

    - terminator: rrnB_T1

  constraints:
    assembly: golden_gate
    enzyme: BsaI
    codon_optimization: local
    gc_window: [0.35, 0.65]
    max_homopolymer: 6

  synthesis:
    vendor: twist
    budget_per_gene: 400
    max_turnaround_days: 21
```