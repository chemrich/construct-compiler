```yaml
construct:
  name: "mito_targeted_mEGFP_mammalian"
  host: HEK293

  backbone:
    catalog_vector: "pTwist CMV"

  cassette:
    - promoter: CMV

    - cistron:
        label: mito_mEGFP
        expression: medium
        chain:
          - gene:
              protein_sequence: "MLSLRQSIRFFKPATRTLCSSRYLL"  # COX8A mitochondrial targeting sequence
          - gene:
              id: mEGFP
              source: fpbase

    - terminator: rrnB_T1

  constraints:
    assembly: golden_gate
    enzyme: BsaI
    codon_optimization: local
    gc_window: [0.35, 0.65]
    max_homopolymer: 6

  synthesis:
    vendor: twist
    budget_per_gene: 400
    max_turnaround_days: 21
```