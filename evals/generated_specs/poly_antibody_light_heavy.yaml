```yaml
construct:
  name: "scFv_bicistronic_expression"
  host: e_coli

  backbone:
    resistance: kanamycin
    ori: pBR322
    source: addgene

  cassette:
    - promoter: T7

    - cistron:
        label: light_chain
        expression: medium
        gene:
          protein_sequence: "PLACEHOLDER_LIGHT_CHAIN_SEQUENCE"

    - spacer: 30

    - cistron:
        label: heavy_chain
        expression: medium
        fused: false
        gene:
          protein_sequence: "PLACEHOLDER_HEAVY_CHAIN_SEQUENCE"

    - terminator: rrnB_T1

  constraints:
    assembly: golden_gate
    enzyme: BsaI
    codon_optimization: local
    gc_window: [0.35, 0.65]
    max_homopolymer: 6

  synthesis:
    vendor: twist
    budget_per_gene: 400
    max_turnaround_days: 21
```