```yaml
construct:
  name: kinase_cascade_four_gene
  host: e_coli_bl21_de3

  backbone:
    catalog_vector: "pET-28b(+)"

  cassette:
    - promoter: T7lac

    - cistron:
        label: kinase
        expression: high
        chain:
          - tag: 6xHis
          - gene:
              id: P0A9B2
              source: uniprot

    - spacer: 30

    - cistron:
        label: substrate
        expression: medium
        fused: false
        gene:
          id: P0ABJ9
          source: uniprot

    - spacer: 30

    - cistron:
        label: adapter
        expression: low
        fused: false
        gene:
          id: P0A6Y8
          source: uniprot

    - spacer: 30

    - cistron:
        label: reporter
        expression: very_low
        fused: false
        gene:
          id: mEGFP
          source: fpbase

    - terminator: rrnB_T1

  constraints:
    assembly: golden_gate
    enzyme: BsaI
    codon_optimization: local
    gc_window: [0.35, 0.65]
    max_homopolymer: 6

  synthesis:
    vendor: twist
    budget_per_gene: 400
    max_turnaround_days: 21
