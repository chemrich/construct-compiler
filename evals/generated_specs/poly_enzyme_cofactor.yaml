```yaml
construct:
  name: "kinase_regulator_bicistronic_operon"
  host: e_coli

  backbone:
    resistance: kanamycin
    ori: pBR322
    source: addgene

  cassette:
    - promoter: T7lac

    - cistron:
        label: kinase
        expression: high
        chain:
          - tag: 6xHis
          - gene:
              id: P31946
              source: uniprot

    - spacer: 30

    - cistron:
        label: regulatory_protein
        expression: low
        fused: false
        gene:
          id: P0A9T0
          source: uniprot

    - terminator: rrnB_T1

  constraints:
    assembly: golden_gate
    enzyme: BsaI
    codon_optimization: local
    gc_window: [0.35, 0.65]
    max_homopolymer: 6

  synthesis:
    vendor: twist
    budget_per_gene: 400
    max_turnaround_days: 21
