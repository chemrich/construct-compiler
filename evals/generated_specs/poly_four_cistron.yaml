```yaml
construct:
  name: four_fluorophore_operon
  host: e_coli

  backbone:
    catalog_vector: "pET-28b(+)"

  cassette:
    - promoter: T7

    - cistron:
        label: egfp
        expression: high
        gene:
          id: mEGFP
          source: fpbase

    - spacer: 25

    - cistron:
        label: scarlet
        expression: high
        fused: false
        gene:
          id: mScarlet
          source: fpbase

    - spacer: 25

    - cistron:
        label: neongreen
        expression: medium
        fused: false
        gene:
          id: mNeonGreen
          source: fpbase

    - spacer: 25

    - cistron:
        label: tagbfp2
        expression: low
        fused: false
        gene:
          id: mTagBFP2
          source: fpbase

    - terminator: rrnB_T1

  constraints:
    assembly: golden_gate
    enzyme: BsaI
    codon_optimization: local
    gc_window: [0.35, 0.65]
    max_homopolymer: 6

  synthesis:
    vendor: twist
    budget_per_gene: 400
    max_turnaround_days: 21
```