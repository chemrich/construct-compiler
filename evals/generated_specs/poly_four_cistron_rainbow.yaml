```yaml
construct:
  name: "four_cistron_fluorescent_operon"
  host: e_coli

  backbone:
    resistance: kanamycin
    ori: pBR322
    source: addgene

  cassette:
    - promoter: T7lac

    - cistron:
        label: mEGFP
        expression: high
        fused: false
        gene:
          id: mEGFP
          source: fpbase

    - spacer: 40

    - cistron:
        label: mScarlet
        expression: medium
        fused: false
        gene:
          id: mScarlet
          source: fpbase

    - spacer: 40

    - cistron:
        label: mTagBFP2
        expression: low
        fused: false
        gene:
          id: mTagBFP2
          source: fpbase

    - spacer: 40

    - cistron:
        label: mCherry
        expression: very_low
        fused: false
        gene:
          id: mCherry
          source: fpbase

    - terminator: rrnB_T1

  constraints:
    assembly: golden_gate
    enzyme: BsaI
    codon_optimization: local
    gc_window: [0.35, 0.65]
    max_homopolymer: 6

  synthesis:
    vendor: twist
    budget_per_gene: 400
    max_turnaround_days: 21
```