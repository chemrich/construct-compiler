```yaml
construct:
  name: "dual_GST_fluorescent_proteins"
  host: e_coli

  backbone:
    catalog_vector: "pET-28b(+)"

  cassette:
    - promoter: T7lac

    - cistron:
        label: target
        expression: high
        chain:
          - tag: GST
          - linker:
              type: GS_flexible
              repeats: 2
          - gene:
              id: mEGFP
              source: fpbase

    - spacer: 30

    - cistron:
        label: reporter
        expression: low
        fused: false
        chain:
          - tag: GST
          - linker:
              type: GS_flexible
              repeats: 2
          - gene:
              id: mScarlet
              source: fpbase

    - terminator: rrnB_T1

  constraints:
    assembly: golden_gate
    enzyme: BsaI
    codon_optimization: local
    gc_window: [0.35, 0.65]
    max_homopolymer: 6

  synthesis:
    vendor: twist
    budget_per_gene: 400
    max_turnaround_days: 21
```