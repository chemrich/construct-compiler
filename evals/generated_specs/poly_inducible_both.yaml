```yaml
construct:
  name: dual_inducible_fluorescent_reporter
  host: e_coli

  backbone:
    catalog_vector: pET-28b(+)

  cassette:
    - promoter: araBAD
    - cistron:
        label: egfp
        expression: high
        gene:
          id: mEGFP
          source: fpbase

    - terminator: rrnB_T1

    - spacer: 30

    - promoter: T7lac
    - cistron:
        label: scarlet
        expression: high
        fused: false
        gene:
          id: mScarlet
          source: fpbase

    - terminator: rrnB_T1

  constraints:
    assembly: golden_gate
    enzyme: BsaI
    codon_optimization: local
    gc_window: [0.35, 0.65]
    max_homopolymer: 6

  synthesis:
    vendor: twist
    budget_per_gene: 400
    max_turnaround_days: 21
```