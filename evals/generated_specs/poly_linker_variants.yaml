```yaml
construct:
  name: dual_fluorescent_reporter_system
  host: e_coli_bl21

  backbone:
    catalog_vector: "pET-28b(+)"

  cassette:
    - promoter: T7lac

    - cistron:
        label: target
        expression: high
        chain:
          - tag: 6xHis
          - linker:
              type: GS_flexible
              repeats: 1
          - solubility_tag: MBP
          - gene:
              id: mEGFP
              source: fpbase

    - spacer: 30

    - cistron:
        label: reporter
        expression: medium
        fused: false
        chain:
          - tag: 6xHis
          - linker:
              type: rigid_EAAAK
              repeats: 1
          - gene:
              id: mScarlet
              source: fpbase

    - terminator: rrnB_T1

  constraints:
    assembly: golden_gate
    enzyme: BsaI
    codon_optimization: local
    gc_window: [0.35, 0.65]
    max_homopolymer: 6

  synthesis:
    vendor: twist
    budget_per_gene: 400
    max_turnaround_days: 21
```