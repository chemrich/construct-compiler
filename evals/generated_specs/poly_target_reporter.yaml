```yaml
construct:
  name: "bicistronic_his_insulin_mcherry"
  host: e_coli

  backbone:
    catalog_vector: "pET-28b(+)"

  cassette:
    - promoter: T7lac

    - cistron:
        label: insulin
        expression: high
        chain:
          - tag: 6xHis
          - gene:
              id: P01308
              source: uniprot

    - spacer: 30

    - cistron:
        label: reporter
        expression: low
        fused: false
        gene:
          id: mCherry
          source: fpbase

    - terminator: rrnB_T1

  constraints:
    assembly: golden_gate
    enzyme: BsaI
    codon_optimization: local
    gc_window: [0.35, 0.65]
    max_homopolymer: 6

  synthesis:
    vendor: twist
    budget_per_gene: 400
    max_turnaround_days: 21
```