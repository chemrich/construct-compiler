              type: GS_flexible
              repeats: 2
          - gene:
              id: mEGFP
              source: fpbase

    - spacer: 50

    - cistron:
        label: reporter_red
        expression: medium
        fused: false
        gene:
          id: mScarlet
          source: fpbase

    - spacer: 50

    - cistron:
        label: reporter_blue
        expression: low
        fused: false
        gene:
          id: mTagBFP2
          source: fpbase

    - terminator: rrnB_T1

  constraints:
    assembly: golden_gate
    enzyme: BsaI
    codon_optimization: local
    gc_window: [0.35, 0.65]
    max_homopolymer: 6

  synthesis:
    vendor: twist
    budget_per_gene: 400
    max_turnaround_days: 21
