construct:
  name: "mEGFP_mScarlet_polycistronic"
  host: e_coli_bl21

  backbone:
    resistance: kanamycin
    ori: pBR322

  cassette:
    - promoter: T7lac

    - cistron:
        label: target
        expression: high
        chain:
          - gene:
              id: mEGFP
              source: fpbase

    - spacer: 30

    - cistron:
        label: reporter
        expression: low
        fused: false
        gene:
          id: mScarlet
          source: fpbase

    - terminator: rrnB_T1

  constraints:
    assembly: golden_gate
    enzyme: BsaI
