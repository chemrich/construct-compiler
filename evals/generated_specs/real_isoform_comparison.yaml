```yaml
construct:
  name: "bicistronic_protein_isoform_comparison"
  host: e_coli_bl21_de3

  backbone:
    catalog_vector: "pET-28b(+)"

  cassette:
    - promoter: T7lac

    - cistron:
        label: isoform_1
        expression: medium
        chain:
          - tag: 6xHis
          - gene:
              protein_sequence: "PLACEHOLDER_ISOFORM_1_SEQUENCE"

    - spacer: 30

    - cistron:
        label: isoform_2
        expression: medium
        fused: false
        chain:
          - tag: 6xHis
          - gene:
              protein_sequence: "PLACEHOLDER_ISOFORM_2_SEQUENCE"

    - terminator: rrnB_T1

  constraints:
    assembly: golden_gate
    enzyme: BsaI
    codon_optimization: local
    gc_window: [0.35, 0.65]
    max_homopolymer: 6

  synthesis:
    vendor: twist
    budget_per_gene: 400
    max_turnaround_days: 21
```