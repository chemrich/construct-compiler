```yaml
construct:
  name: His_mEGFP_LB_optimized
  host: e_coli_bl21_de3

  backbone:
    catalog_vector: "pET-28b(+)"

  cassette:
    - promoter: T7lac  # T7lac for tight control and IPTG induction in LB

    - cistron:
        label: target
        expression: medium  # medium expression to avoid inclusion bodies in LB
        chain:
          - tag: 6xHis
          - gene:
              id: mEGFP
              source: fpbase

    - terminator: rrnB_T1

  constraints:
    assembly: golden_gate
    enzyme: BsaI
    codon_optimization: local
    gc_window: [0.35, 0.65]
    max_homopolymer: 6

  synthesis:
    vendor: twist
    budget_per_gene: 400
    max_turnaround_days: 21
