```yaml
construct:
  name: kinase_substrate_bicistronic
  host: e_coli_bl21_de3

  backbone:
    catalog_vector: "pET-28b(+)"

  cassette:
    - promoter: T7lac

    - cistron:
        label: kinase
        expression: high
        gene:
          id: your_kinase_gene  # replace with actual kinase gene ID
          source: uniprot

    - spacer: 30

    - cistron:
        label: substrate
        expression: low
        fused: false
        chain:
          - tag: 6xHis
          - gene:
              id: your_substrate_gene  # replace with actual substrate gene ID
              source: uniprot

    - terminator: rrnB_T1

  constraints:
    assembly: golden_gate
    enzyme: BsaI
    codon_optimization: local
    gc_window: [0.35, 0.65]
    max_homopolymer: 6

  synthesis:
    vendor: twist
    budget_per_gene: 400
    max_turnaround_days: 21
```