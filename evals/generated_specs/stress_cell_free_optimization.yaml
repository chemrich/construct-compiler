```yaml
construct:
  name: "cfps_wheat_germ_optimized"
  host: e_coli  # for template prep, actual expression in wheat germ CFPS

  backbone:
    catalog_vector: "pET-28b(+)"

  cassette:
    - promoter: T7

    - cistron:
        label: target
        expression: high
        chain:
          - tag: 6xHis
          - gene:
              id: mEGFP
              source: fpbase

    - terminator: T7term

  constraints:
    assembly: golden_gate
    enzyme: BsaI
    codon_optimization: local  # avoids problematic codons for wheat germ
    gc_window: [0.35, 0.65]
    max_homopolymer: 6
    target_length: 1500  # keeps construct <2kb

  synthesis:
    vendor: twist
    budget_per_gene: 400
    max_turnaround_days: 21
```