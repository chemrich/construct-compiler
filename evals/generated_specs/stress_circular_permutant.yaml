```yaml
construct:
  name: "GFP_circular_permutant_library"
  host: e_coli_bl21_de3

  backbone:
    catalog_vector: "pET-28b(+)"

  cassette:
    - promoter: T7lac

    - cistron:
        label: cp_gfp_library
        expression: high
        chain:
          - tag: 6xHis
          - cleavage_site: TEV
          - linker:
              type: GS_flexible
              repeats: 2
          - gene:
              id: cp_sfGFP_template
              source: fpbase
              # Template design: original sfGFP with variable cut sites
              # Positions for circular permutation: 145, 157, 172, 195, 215
              # Each variant connects C-term to N-term with flexible linker
              # and starts translation at the cut position
              circular_permutation:
                template: sfGFP
                cut_positions: [145, 157, 172, 195, 215]
                linker_sequence: "GGSGGS"  # connects original C-term to N-term

    - terminator: rrnB_T1

  constraints:
    assembly: golden_gate
    enzyme: BsaI
    codon_optimization: local
    gc_window: [0.35, 0.65]
    max_homopolymer: 6
    # Each cp variant maintains proper folding through strategic cut site selection
    # Positions chosen to avoid disrupting beta-barrel structure

  synthesis:
    vendor: twist
    budget_per_gene: 600  # Higher budget for custom library synthesis
    max_turnaround_days: 28
```