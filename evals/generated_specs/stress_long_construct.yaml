```yaml
construct:
  name: "pentacistronic_fluorescent_operon"
  host: e_coli_bl21_de3

  backbone:
    catalog_vector: "pET-28b(+)"

  cassette:
    - promoter: T7lac

    - cistron:
        label: mEGFP_high
        expression: high
        chain:
          - tag: 6xHis
          - cleavage_site: TEV
          - gene:
              id: mEGFP
              source: fpbase

    - spacer: 50

    - cistron:
        label: mScarlet_medium
        expression: medium
        fused: false
        chain:
          - solubility_tag: GST
          - cleavage_site: 3C
          - gene:
              id: mScarlet
              source: fpbase

    - spacer: 50

    - cistron:
        label: mNeonGreen_low
        expression: low
        fused: false
        gene:
          id: mNeonGreen
          source: fpbase

    - spacer: 50

    - cistron:
        label: mCherry_very_low
        expression: very_low
        fused: false
        chain:
          - tag: Strep-II
          - gene:
              id: mCherry
              source: fpbase

    - spacer: 50

    - cistron:
        label: mTagBFP2_medium
        expression: medium
        fused: false
        chain:
          - solubility_tag: MBP
          - cleavage_site: TEV
          - gene:
              id: mTagBFP2
              source: fpbase

    - terminator: rrnB_T1

  constraints:
    assembly: golden_gate
    enzyme: BsaI
    codon_optimization: local
    gc_window: [0.35, 0.65]
    max_homopolymer: 6

  synthesis:
    vendor: twist
    budget_per_gene: 400
    max_turnaround_days: 21
