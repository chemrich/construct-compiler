```yaml
construct:
  name: "four_enzyme_metabolic_pathway"
  host: e_coli

  backbone:
    catalog_vector: "pET-28b(+)"

  cassette:
    - promoter: T7lac

    - cistron:
        label: enzyme_A
        expression: high
        chain:
          - tag: 6xHis
          - gene:
              id: "enzymeA"
              source: uniprot

    - spacer: 30

    - cistron:
        label: enzyme_B
        expression: medium
        fused: false
        gene:
          id: "enzymeB"
          source: uniprot

    - spacer: 30

    - cistron:
        label: enzyme_C
        expression: medium
        fused: false
        chain:
          - tag: GST
          - gene:
              id: "enzymeC"
              source: uniprot

    - spacer: 30

    - cistron:
        label: enzyme_D
        expression: low
        fused: false
        gene:
          id: "enzymeD"
          source: uniprot

    - terminator: rrnB_T1

  constraints:
    assembly: golden_gate
    enzyme: BsaI
    codon_optimization: local
    gc_window: [0.35, 0.65]
    max_homopolymer: 6

  synthesis:
    vendor: twist
    budget_per_gene: 400
    max_turnaround_days: 21
```