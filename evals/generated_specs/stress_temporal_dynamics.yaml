```yaml
construct:
  name: temporal_protein_dynamics_operon
  host: e_coli_bl21_de3

  backbone:
    catalog_vector: "pET-28b(+)"

  cassette:
    - promoter: T7lac

    - cistron:
        label: base_untagged
        expression: medium
        gene:
          id: P0A7B8  # example protein, replace with target
          source: uniprot

    - spacer: 30

    - cistron:
        label: ssrA_tagged
        expression: medium
        fused: false
        chain:
          - gene:
              id: P0A7B8
              source: uniprot
          - tag: ssrA  # rapid degradation tag

    - spacer: 30

    - cistron:
        label: his_tagged_stable
        expression: medium
        fused: false
        chain:
          - tag: 6xHis
          - gene:
              id: P0A7B8
              source: uniprot

    - terminator: rrnB_T1

  constraints:
    assembly: golden_gate
    enzyme: BsaI
    codon_optimization: local
    gc_window: [0.35, 0.65]
    max_homopolymer: 6

  synthesis:
    vendor: twist
    budget_per_gene: 400
    max_turnaround_days: 21
```