construct:
  name: His_mEGFP_terminator_test
  host: e_coli_bl21_de3

  backbone:
    catalog_vector: "pET-28b(+)"

  cassette:
    - promoter: T7lac

    - cistron:
        label: his_egfp_t1
        expression: high
        chain:
          - tag: 6xHis
          - gene:
              id: mEGFP
              source: fpbase

    - terminator: rrnB_T1

    - spacer: 50

    - promoter: T7lac

    - cistron:
        label: his_egfp_t7
        expression: high
        chain:
          - tag: 6xHis
          - gene:
              id: mEGFP
              source: fpbase

    - terminator: T7term

    - spacer: 50

    - promoter: T7lac

    - cistron:
        label: his_egfp_biobrick
        expression: high
        chain:
          - tag: 6xHis
          - gene:
              id: mEGFP
              source: fpbase

    - terminator: BBa_B0015

  constraints:
    assembly: golden_gate
    enzyme: BsaI
    codon_optimization: local
    gc_window: [0.35, 0.65]
    max_homopolymer: 6

  synthesis:
    vendor: twist
    budget_per_gene: 400
    max_turnaround_days: 21