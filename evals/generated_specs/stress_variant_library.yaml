          - tag: 6xHis
          - gene:
              id: mNeonGreen
              source: fpbase

    - terminator: rrnB_T1

  constraints:
    assembly: golden_gate
    enzyme: BsaI
    codon_optimization: local
    gc_window: [0.35, 0.65]
    max_homopolymer: 6
    rbs_variants:
      - strength: very_weak
        sequence: "AAGGAG"
        spacing: 8
      - strength: weak
        sequence: "AGGAGG"
        spacing: 7
      - strength: medium
        sequence: "AAGGAGG"
        spacing: 6
      - strength: strong
        sequence: "AGGAGGT"
        spacing: 5
      - strength: very_strong
        sequence: "AAGGAGGT"
        spacing: 5

  synthesis:
    vendor: twist
    budget_per_gene: 400
    max_turnaround_days: 21
