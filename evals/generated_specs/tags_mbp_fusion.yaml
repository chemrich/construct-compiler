construct:
  name: "His_TEV_MBP_GFP_fusion"
  host: e_coli_bl21

  backbone:
    resistance: kanamycin
    ori: pBR322

  cassette:
    - promoter: T7lac

    - cistron:
        label: target
        expression: high
        chain:
          - tag: 6xHis
          - cleavage_site: TEV
          - solubility_tag: MBP
          - linker:
              type: GS_flexible
              repeats: 2
          - gene:
              id: mEGFP
              source: fpbase

    - terminator: rrnB_T1

  constraints:
    assembly: golden_gate
    enzyme: BsaI
