```yaml
construct:
  name: araBAD_inducible_GFP
  host: e_coli

  backbone:
    catalog_vector: "pBAD/His B"
    
  cassette:
    - promoter: araBAD
    
    - cistron:
        label: target
        expression: high
        gene:
          id: mEGFP
          source: fpbase
          
    - terminator: rrnB_T1

  constraints:
    assembly: golden_gate
    enzyme: BsaI
    codon_optimization: local
    gc_window: [0.35, 0.65]
    max_homopolymer: 6

  synthesis:
    vendor: twist
    budget_per_gene: 400
    max_turnaround_days: 21
