construct:
  name: his_gfp_expression_variants
  host: e_coli

  backbone:
    catalog_vector: "pET-28b(+)"

  cassette:
    - promoter: T7lac

    - cistron:
        label: high_expression_gfp
        expression: high
        chain:
          - tag: 6xHis
          - gene:
              id: mEGFP
              source: fpbase

    - spacer: 30

    - cistron:
        label: medium_expression_gfp
        expression: medium
        fused: false
        chain:
          - tag: 6xHis
          - gene:
              id: mEGFP
              source: fpbase

    - spacer: 30

    - cistron:
        label: low_expression_gfp
        expression: low
        fused: false
        chain:
          - tag: 6xHis
          - gene:
              id: mEGFP
              source: fpbase

    - terminator: rrnB_T1

  constraints:
    assembly: golden_gate
    enzyme: BsaI
    codon_optimization: local
    gc_window: [0.35, 0.65]
    max_homopolymer: 6

  synthesis:
    vendor: twist
    budget_per_gene: 400
    max_turnaround_days: 21