```yaml
construct:
  name: dual_antibiotic_selection
  host: e_coli

  backbone:
    resistance: kanamycin
    ori: pBR322
    source: addgene

  cassette:
    - promoter: T7lac

    - cistron:
        label: beta_lactamase
        expression: medium
        gene:
          id: P62593  # TEM-1 beta-lactamase
          source: uniprot

    - spacer: 30

    - cistron:
        label: aminoglycoside_resistance
        expression: medium
        fused: false
        gene:
          id: P00551  # Aminoglycoside 3'-phosphotransferase
          source: uniprot

    - terminator: rrnB_T1

  constraints:
    assembly: golden_gate
    enzyme: BsaI
    codon_optimization: local
    gc_window: [0.35, 0.65]
    max_homopolymer: 6

  synthesis:
    vendor: twist
    budget_per_gene: 400
    max_turnaround_days: 21
```