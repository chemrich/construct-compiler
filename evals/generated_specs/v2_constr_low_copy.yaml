```yaml
construct:
  name: "toxic_protein_low_copy_expression"
  host: e_coli

  backbone:
    resistance: kanamycin
    ori: p15A  # Low copy number origin
    source: addgene

  cassette:
    - promoter: araBAD  # Tightly regulated for toxic proteins

    - cistron:
        label: toxic_target
        expression: very_low  # Minimal expression to reduce toxicity
        chain:
          - tag: 6xHis
          - cleavage_site: TEV
          - solubility_tag: MBP  # Helps with folding and reduces aggregation
          - linker:
              type: GS_flexible
              repeats: 2
          - gene:
              protein_sequence: "PLACEHOLDER_TOXIC_PROTEIN_SEQUENCE"

    - terminator: rrnB_T1

  constraints:
    assembly: golden_gate
    enzyme: BsaI
    codon_optimization: local
    gc_window: [0.35, 0.65]
    max_homopolymer: 6

  synthesis:
    vendor: twist
    budget_per_gene: 400
    max_turnaround_days: 21
```