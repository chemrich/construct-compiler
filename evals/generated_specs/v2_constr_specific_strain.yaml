```yaml
construct:
  name: human_kinase_rosetta_optimized
  host: e_coli_bl21_de3

  backbone:
    catalog_vector: "pET-28b(+)"

  cassette:
    - promoter: T7lac

    - cistron:
        label: target
        expression: medium
        chain:
          - tag: 6xHis
          - cleavage_site: TEV
          - solubility_tag: MBP
          - linker:
              type: GS_flexible
              repeats: 2
          - gene:
              id: P31749  # CDK2 as example human kinase
              source: uniprot

    - terminator: rrnB_T1

  constraints:
    assembly: golden_gate
    enzyme: BsaI
    codon_optimization: none  # preserve rare codons for Rosetta strain
    gc_window: [0.30, 0.70]
    max_homopolymer: 6

  synthesis:
    vendor: twist
    budget_per_gene: 600
    max_turnaround_days: 21
