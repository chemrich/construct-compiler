construct:
  name: "pET_HEK293_expression"
  host: HEK293

  backbone:
    catalog_vector: "pTwist CMV"  # pET vectors are E. coli specific, using mammalian equivalent

  cassette:
    - promoter: CMV  # CMV is standard for mammalian expression instead of T7

    - cistron:
        label: target
        expression: high
        gene:
          id: mEGFP
          source: fpbase

    - terminator: rrnB_T1

  constraints:
    assembly: golden_gate
    enzyme: BsaI
    codon_optimization: local
    gc_window: [0.35, 0.65]
    max_homopolymer: 6

  synthesis:
    vendor: twist
    budget_per_gene: 400
    max_turnaround_days: 21