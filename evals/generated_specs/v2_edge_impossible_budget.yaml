```yaml
construct:
  name: pentacistronic_budget_construct
  host: e_coli

  backbone:
    resistance: kanamycin
    ori: pBR322
    source: addgene

  cassette:
    - promoter: J23100

    - cistron:
        label: cistron1
        expression: very_low
        gene:
          id: sfGFP
          source: fpbase

    - spacer: 20

    - cistron:
        label: cistron2
        expression: very_low
        fused: false
        gene:
          id: mTagBFP2
          source: fpbase

    - spacer: 20

    - cistron:
        label: cistron3
        expression: very_low
        fused: false
        gene:
          id: mScarlet
          source: fpbase

    - spacer: 20

    - cistron:
        label: cistron4
        expression: very_low
        fused: false
        gene:
          id: mNeonGreen
          source: fpbase

    - spacer: 20

    - cistron:
        label: cistron5
        expression: very_low
        fused: false
        gene:
          id: mCherry
          source: fpbase

    - terminator: rrnB_T1

  constraints:
    assembly: golden_gate
    enzyme: BsaI
    codon_optimization: local
    gc_window: [0.35, 0.65]
    max_homopolymer: 6

  synthesis:
    vendor: twist
    budget_per_gene: 1  # $5 total / 5 genes = $1 per gene
    max_turnaround_days: 21
```