```yaml
construct:
  name: "dual_promoter_lentiviral_EF1alpha_PGK_puro"
  host: HEK293

  backbone:
    catalog_vector: "pTwist Lenti"

  cassette:
    - promoter: EF1_alpha

    - cistron:
        label: gene_of_interest
        expression: high
        gene:
          id: "placeholder_GOI"  # Replace with actual gene
          source: uniprot

    - promoter: PGK

    - cistron:
        label: selection_marker
        expression: medium
        fused: false
        gene:
          id: puromycin_resistance
          source: uniprot

    - terminator: rrnB_T1

  constraints:
    assembly: golden_gate
    enzyme: BsaI
    codon_optimization: local
    gc_window: [0.35, 0.65]
    max_homopolymer: 6

  synthesis:
    vendor: twist
    budget_per_gene: 400
    max_turnaround_days: 21
