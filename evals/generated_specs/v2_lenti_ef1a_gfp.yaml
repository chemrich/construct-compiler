```yaml
construct:
  name: "lentiviral_EF1alpha_GFP_puromycin"
  host: HEK293

  backbone:
    catalog_vector: "pTwist CMV"  # Will be modified for lentiviral backbone
    # Custom lentiviral elements would include LTRs, packaging signal, etc.

  cassette:
    - promoter: EF1_alpha

    - cistron:
        label: fluorescent_reporter
        expression: high
        gene:
          id: EGFP
          source: fpbase

    - spacer: 30

    - cistron:
        label: selection_marker
        expression: medium
        fused: false
        gene:
          id: P00552  # Puromycin N-acetyltransferase
          source: uniprot

    - terminator: rrnB_T1

  constraints:
    assembly: golden_gate
    enzyme: BsaI
    codon_optimization: local
    gc_window: [0.35, 0.65]
    max_homopolymer: 6

  synthesis:
    vendor: twist
    budget_per_gene: 400
    max_turnaround_days: 21
```