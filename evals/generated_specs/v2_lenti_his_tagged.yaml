```yaml
construct:
  name: His_tagged_lentiviral_expression
  host: HEK293

  backbone:
    catalog_vector: "pTwist CMV"

  cassette:
    - promoter: CMV

    - cistron:
        label: target
        expression: high
        chain:
          - tag: 6xHis
          - gene:
              id: mEGFP  # placeholder - replace with actual gene of interest
              source: fpbase

    - terminator: rrnB_T1

  constraints:
    assembly: golden_gate
    enzyme: BsaI
    codon_optimization: local
    gc_window: [0.35, 0.65]
    max_homopolymer: 6

  synthesis:
    vendor: twist
    budget_per_gene: 400
    max_turnaround_days: 21
