```yaml
construct:
  name: "lentiviral_multicolor_imaging_construct"
  host: HEK293

  backbone:
    catalog_vector: "pTwist CMV"

  cassette:
    - promoter: CMV

    - cistron:
        label: egfp
        expression: high
        gene:
          id: mEGFP
          source: fpbase

    - spacer: 30

    - cistron:
        label: cherry
        expression: high
        fused: false
        gene:
          id: mCherry
          source: fpbase

    - spacer: 30

    - cistron:
        label: bfp
        expression: high
        fused: false
        gene:
          id: mTagBFP2
          source: fpbase

    - terminator: rrnB_T1

  constraints:
    assembly: golden_gate
    enzyme: BsaI
    codon_optimization: local
    gc_window: [0.35, 0.65]
    max_homopolymer: 6

  synthesis:
    vendor: twist
    budget_per_gene: 400
    max_turnaround_days: 21
```