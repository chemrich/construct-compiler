```yaml
construct:
  name: synapsin_GFP_lentiviral
  host: HEK293

  backbone:
    catalog_vector: "pTwist CMV"  # Will modify promoter to synapsin
    
  cassette:
    - promoter: CMV  # Will be replaced with synapsin promoter sequence
    
    - cistron:
        label: reporter
        expression: medium
        gene:
          id: EGFP
          source: fpbase
          
    - terminator: rrnB_T1

  constraints:
    assembly: golden_gate
    enzyme: BsaI
    codon_optimization: local
    gc_window: [0.35, 0.65]
    max_homopolymer: 6

  synthesis:
    vendor: twist
    budget_per_gene: 400
    max_turnaround_days: 21
```