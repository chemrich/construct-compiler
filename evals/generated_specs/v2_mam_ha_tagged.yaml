```yaml
construct:
  name: "HA_tagged_receptor_kinase_HEK293"
  host: HEK293

  backbone:
    catalog_vector: "pTwist CMV"

  cassette:
    - promoter: CMV

    - cistron:
        label: receptor_kinase
        expression: high
        chain:
          - tag: HA
          - gene:
              id: EGFR_HUMAN  # Example receptor kinase - replace with specific kinase
              source: uniprot

    - terminator: rrnB_T1

  constraints:
    assembly: golden_gate
    enzyme: BsaI
    codon_optimization: local
    gc_window: [0.35, 0.65]
    max_homopolymer: 6

  synthesis:
    vendor: twist
    budget_per_gene: 400
    max_turnaround_days: 21
