```yaml
construct:
  name: myc_tagged_transcription_factor_HEK293T
  host: HEK293

  backbone:
    catalog_vector: "pTwist CMV"

  cassette:
    - promoter: CMV

    - cistron:
        label: myc_tf
        expression: high
        chain:
          - tag: Myc
          - gene:
              id: P53_HUMAN
              source: uniprot

    - terminator: BGH_polyA

  constraints:
    assembly: golden_gate
    enzyme: BsaI
    codon_optimization: local
    gc_window: [0.35, 0.65]
    max_homopolymer: 6

  synthesis:
    vendor: twist
    budget_per_gene: 400
    max_turnaround_days: 21
```