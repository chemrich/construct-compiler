```yaml
construct:
  name: "HEK293_GFP_G418_selection"
  host: HEK293

  backbone:
    catalog_vector: "pTwist CMV"

  cassette:
    - promoter: CMV

    - cistron:
        label: target
        expression: high
        gene:
          id: mEGFP
          source: fpbase

    - spacer: 30

    - cistron:
        label: selection
        expression: medium
        fused: false
        gene:
          id: P00552  # neomycin phosphotransferase
          source: uniprot

    - terminator: rrnB_T1

  constraints:
    assembly: golden_gate
    enzyme: BsaI
    codon_optimization: local
    gc_window: [0.35, 0.65]
    max_homopolymer: 6

  synthesis:
    vendor: twist
    budget_per_gene: 400
    max_turnaround_days: 21
```