```yaml
construct:
  name: "heterodimeric_enzyme_alpha_beta_bicistronic"
  host: e_coli

  backbone:
    resistance: kanamycin
    ori: pBR322
    source: addgene

  cassette:
    - promoter: T7lac

    - cistron:
        label: alpha_subunit
        expression: high
        chain:
          - tag: 6xHis
          - cleavage_site: TEV
          - gene:
              id: P0ABE7  # placeholder - replace with actual alpha subunit UniProt ID
              source: uniprot

    - spacer: 30

    - cistron:
        label: beta_subunit
        expression: high
        fused: false
        gene:
          id: P0ABE8  # placeholder - replace with actual beta subunit UniProt ID
          source: uniprot

    - terminator: rrnB_T1

  constraints:
    assembly: golden_gate
    enzyme: BsaI
    codon_optimization: local
    gc_window: [0.35, 0.65]
    max_homopolymer: 6

  synthesis:
    vendor: twist
    budget_per_gene: 400
    max_turnaround_days: 21
