```yaml
construct:
  name: "GST_kinase_GST_phosphatase_bicistronic"
  host: e_coli

  backbone:
    resistance: kanamycin
    ori: pBR322
    source: addgene

  cassette:
    - promoter: T7lac

    - cistron:
        label: kinase
        expression: high
        chain:
          - tag: GST
          - gene:
              id: "P31749"
              source: uniprot

    - spacer: 30

    - cistron:
        label: phosphatase
        expression: medium
        fused: false
        chain:
          - tag: GST
          - gene:
              id: "P37689"
              source: uniprot

    - terminator: rrnB_T1

  constraints:
    assembly: golden_gate
    enzyme: BsaI
    codon_optimization: local
    gc_window: [0.35, 0.65]
    max_homopolymer: 6

  synthesis:
    vendor: twist
    budget_per_gene: 400
    max_turnaround_days: 21
