```yaml
construct:
  name: "scFv_His_binding_assay"
  host: e_coli_bl21_de3

  backbone:
    catalog_vector: "pET-28b(+)"

  cassette:
    - promoter: T7lac

    - cistron:
        label: scFv
        expression: high
        chain:
          - gene:
              id: P01834  # Anti-lysozyme scFv example - user should replace with specific scFv
              source: uniprot
          - tag: 6xHis

    - terminator: rrnB_T1

  constraints:
    assembly: golden_gate
    enzyme: BsaI
    codon_optimization: local
    gc_window: [0.35, 0.65]
    max_homopolymer: 6

  synthesis:
    vendor: twist
    budget_per_gene: 400
    max_turnaround_days: 21
