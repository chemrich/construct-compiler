```yaml
construct:
  name: protein_chaperone_bicistronic
  host: e_coli_bl21_de3

  backbone:
    catalog_vector: "pET-28b(+)"

  cassette:
    - promoter: T7lac

    - cistron:
        label: target_protein
        expression: medium
        chain:
          - tag: 6xHis
          - cleavage_site: TEV
          - solubility_tag: MBP
          - linker:
              type: GS_flexible
              repeats: 2
          - gene:
              protein_sequence: "MSTART"  # Replace with your protein sequence

    - spacer: 30

    - cistron:
        label: chaperone
        expression: high
        fused: false
        gene:
          id: P0A6F5  # GroEL chaperonin
          source: uniprot

    - terminator: rrnB_T1

  constraints:
    assembly: golden_gate
    enzyme: BsaI
    codon_optimization: local
    gc_window: [0.35, 0.65]
    max_homopolymer: 6

  synthesis:
    vendor: twist
    budget_per_gene: 400
    max_turnaround_days: 21
```