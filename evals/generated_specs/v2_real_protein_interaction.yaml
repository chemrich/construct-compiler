```yaml
construct:
  name: pulldown_bait_prey_dual_expression
  host: e_coli_bl21_de3

  backbone:
    catalog_vector: "pET-28b(+)"

  cassette:
    - promoter: T7lac

    - cistron:
        label: bait
        expression: high
        chain:
          - tag: 6xHis
          - gene:
              id: target_bait_gene
              source: uniprot  # Replace with actual gene ID

    - spacer: 30

    - cistron:
        label: prey
        expression: medium
        fused: false
        chain:
          - tag: FLAG
          - gene:
              id: target_prey_gene
              source: uniprot  # Replace with actual gene ID

    - terminator: rrnB_T1

  constraints:
    assembly: golden_gate
    enzyme: BsaI
    codon_optimization: local
    gc_window: [0.35, 0.65]
    max_homopolymer: 6

  synthesis:
    vendor: twist
    budget_per_gene: 400
    max_turnaround_days: 21
