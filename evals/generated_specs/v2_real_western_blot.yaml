```yaml
construct:
  name: "FLAG_tagged_kinase"
  host: e_coli_bl21_de3

  backbone:
    catalog_vector: "pET-28b(+)"

  cassette:
    - promoter: T7

    - cistron:
        label: target
        expression: high
        chain:
          - tag: FLAG
          - gene:
              id: "your_kinase_gene"  # Replace with actual gene ID
              source: uniprot

    - terminator: rrnB_T1

  constraints:
    assembly: golden_gate
    enzyme: BsaI
    codon_optimization: local
    gc_window: [0.35, 0.65]
    max_homopolymer: 6

  synthesis:
    vendor: twist
    budget_per_gene: 400
    max_turnaround_days: 21
