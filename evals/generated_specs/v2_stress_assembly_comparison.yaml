construct:
  name: "multi_assembly_compatible_his_mbp_egfp"
  host: e_coli_bl21_de3

  backbone:
    catalog_vector: "pET-28b(+)"

  cassette:
    - promoter: T7lac

    - cistron:
        label: target
        expression: high
        chain:
          - tag: 6xHis
          - cleavage_site: TEV
          - solubility_tag: MBP
          - linker:
              type: GS_flexible
              repeats: 2
          - gene:
              id: mEGFP
              source: fpbase

    - terminator: rrnB_T1

  constraints:
    assembly: golden_gate  # Compatible sites will be added for Gibson and traditional cloning as well
    enzyme: BsaI
    codon_optimization: local
    gc_window: [0.35, 0.65]
    max_homopolymer: 6
    # Golden Gate: BsaI sites flanking insert
    # Gibson: 20-40bp homology arms to vector
    # Traditional: NdeI (5') and XhoI (3') sites added for pET compatibility

  synthesis:
    vendor: twist
    budget_per_gene: 400
    max_turnaround_days: 21