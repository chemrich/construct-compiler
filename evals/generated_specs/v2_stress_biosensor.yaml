```yaml
construct:
  name: "arabinose_biosensor_with_regulatory_genes"
  host: e_coli

  backbone:
    resistance: kanamycin
    ori: pBR322
    source: addgene

  cassette:
    - promoter: araBAD

    - cistron:
        label: reporter
        expression: high
        gene:
          id: mEGFP
          source: fpbase

    - spacer: 30

    - cistron:
        label: regulatory1
        expression: medium
        fused: false
        gene:
          id: araC
          source: uniprot

    - spacer: 30

    - cistron:
        label: regulatory2
        expression: medium
        fused: false
        gene:
          id: araE
          source: uniprot

    - terminator: rrnB_T1

  constraints:
    assembly: golden_gate
    enzyme: BsaI
    codon_optimization: local
    gc_window: [0.35, 0.65]
    max_homopolymer: 6

  synthesis:
    vendor: twist
    budget_per_gene: 400
    max_turnaround_days: 21
```