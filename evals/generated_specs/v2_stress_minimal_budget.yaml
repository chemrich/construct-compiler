```yaml
construct:
  name: "tricistronic_tagged_proteins"
  host: e_coli_bl21_de3

  backbone:
    catalog_vector: "pET-28b(+)"

  cassette:
    - promoter: T7lac

    - cistron:
        label: protein1
        expression: medium
        chain:
          - tag: 6xHis
          - gene:
              id: mEGFP
              source: fpbase

    - spacer: 30

    - cistron:
        label: protein2
        expression: medium
        fused: false
        chain:
          - tag: FLAG
          - gene:
              id: mScarlet
              source: fpbase

    - spacer: 30

    - cistron:
        label: protein3
        expression: medium
        fused: false
        chain:
          - tag: Strep-II
          - gene:
              id: mTagBFP2
              source: fpbase

    - terminator: rrnB_T1

  constraints:
    assembly: golden_gate
    enzyme: BsaI
    codon_optimization: local
    gc_window: [0.35, 0.65]
    max_homopolymer: 6

  synthesis:
    vendor: idt
    budget_per_gene: 50
    max_turnaround_days: 21
```