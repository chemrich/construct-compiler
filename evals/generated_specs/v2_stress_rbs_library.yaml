```yaml
construct:
  name: RBS_library_bicistronic_GFP_mCherry
  host: e_coli

  backbone:
    catalog_vector: "pET-28b(+)"

  cassette:
    - promoter: T7lac

    - cistron:
        label: gfp
        expression: high
        chain:
          - tag: 6xHis
          - gene:
              id: sfGFP
              source: fpbase

    - spacer: 30

    - cistron:
        label: mcherry
        expression: medium
        fused: false
        gene:
          id: mCherry
          source: fpbase

    - terminator: rrnB_T1

  constraints:
    assembly: golden_gate
    enzyme: BsaI
    codon_optimization: local
    gc_window: [0.35, 0.65]
    max_homopolymer: 6
    rbs_library:
      target_cistron: mcherry
      expression_levels: [very_low, low, medium, high, very_high]
      library_size: 5

  synthesis:
    vendor: twist
    budget_per_gene: 400
    max_turnaround_days: 21
```