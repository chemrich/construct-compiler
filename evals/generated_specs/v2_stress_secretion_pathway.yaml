```yaml
construct:
  name: therapeutic_enzyme_secretion
  host: e_coli

  backbone:
    catalog_vector: "pET-28b(+)"

  cassette:
    - promoter: T7lac

    - cistron:
        label: secreted_enzyme
        expression: medium
        chain:
          - signal_peptide: pelB  # E. coli periplasmic leader for Sec pathway
          - tag: 6xHis
          - cleavage_site: TEV
          - gene:
              id: P00698  # Human tissue plasminogen activator as example therapeutic enzyme
              source: uniprot

    - terminator: rrnB_T1

  constraints:
    assembly: golden_gate
    enzyme: BsaI
    codon_optimization: local
    gc_window: [0.35, 0.65]
    max_homopolymer: 6

  synthesis:
    vendor: twist
    budget_per_gene: 400
    max_turnaround_days: 21
```