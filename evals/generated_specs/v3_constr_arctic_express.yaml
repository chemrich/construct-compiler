```yaml
construct:
  name: "cold_active_enzyme_arctic_expression"
  host: e_coli_bl21  # ArcticExpress is BL21-based with cold-adapted chaperones

  backbone:
    catalog_vector: "pET-28b(+)"

  cassette:
    - promoter: T7lac

    - cistron:
        label: cold_enzyme
        expression: medium  # reduced at 10°C but compensated by cold adaptation
        chain:
          - tag: 6xHis
          - gene:
            protein_sequence: "MKHHHHHHENLYFQG"  # placeholder - replace with actual cold-active enzyme sequence

    - terminator: rrnB_T1

  constraints:
    assembly: golden_gate
    enzyme: BsaI
    codon_optimization: local
    gc_window: [0.35, 0.65]
    max_homopolymer: 6

  synthesis:
    vendor: twist
    budget_per_gene: 400
    max_turnaround_days: 21
```