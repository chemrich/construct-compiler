```yaml
construct:
  name: bicistronic_gfp_rfp
  host: e_coli

  backbone:
    resistance: kanamycin
    ori: pBR322
    source: addgene

  cassette:
    - promoter: T7lac

    - cistron:
        label: primary
        expression: high
        gene:
          id: sfGFP
          source: fpbase

    - spacer: 30

    - cistron:
        label: secondary
        expression: medium
        fused: false
        gene:
          id: mScarlet
          source: fpbase

    - terminator: rrnB_T1

  constraints:
    assembly: golden_gate
    enzyme: BsaI
    codon_optimization: local
    gc_window: [0.35, 0.65]
    max_homopolymer: 6

  synthesis:
    vendor: idt
    budget_per_gene: 125
    max_turnaround_days: 14
```