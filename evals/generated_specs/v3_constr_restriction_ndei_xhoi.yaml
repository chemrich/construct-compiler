```yaml
construct:
  name: "GFP_pET28a_NdeI_XhoI"
  host: e_coli_bl21_de3

  backbone:
    catalog_vector: "pET-28a(+)"

  cassette:
    - promoter: T7lac

    - cistron:
        label: target
        expression: high
        chain:
          - tag: 6xHis
          - gene:
              id: sfGFP
              source: fpbase

    - terminator: T7term

  constraints:
    assembly: restriction_cloning
    sites: [NdeI, XhoI]  # NdeI at 5', XhoI at 3'
    codon_optimization: local
    gc_window: [0.35, 0.65]
    max_homopolymer: 6

  synthesis:
    vendor: idt
    budget_per_gene: 200
    max_turnaround_days: 14
