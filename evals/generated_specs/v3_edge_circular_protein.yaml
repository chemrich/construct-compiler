```yaml
construct:
  name: "cpGFP_biosensor"
  host: e_coli_bl21_de3

  backbone:
    catalog_vector: "pET-28b(+)"

  cassette:
    - promoter: T7lac

    - cistron:
        label: cpGFP
        expression: high
        chain:
          - tag: 6xHis
          - cleavage_site: TEV
          - linker:
              type: GS_flexible
              repeats: 2
          - gene:
              id: cpGFP
              source: fpbase
              # Circular permutation: original termini connected with flexible linker,
              # new termini created at surface loop between beta strands 7-10
              circular_permutation:
                original_start: 1
                original_end: 238
                new_start: 145  # Position in surface loop
                linker_sequence: "GGSGGS"

    - terminator: rrnB_T1

  constraints:
    assembly: golden_gate
    enzyme: BsaI
    codon_optimization: local
    gc_window: [0.35, 0.65]
    max_homopolymer: 6

  synthesis:
    vendor: twist
    budget_per_gene: 400
    max_turnaround_days: 21
