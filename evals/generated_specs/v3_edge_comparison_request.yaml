construct:
  name: kinase_His_tag_comparison
  host: e_coli_bl21_de3

  backbone:
    catalog_vector: "pET-28b(+)"

  cassette:
    - promoter: T7lac

    - cistron:
        label: kinase_his
        expression: high
        chain:
          - tag: 6xHis
          - cleavage_site: TEV
          - gene:
              id: "your_kinase_gene"  # Replace with actual kinase gene ID
              source: uniprot

    - spacer: 30

    - cistron:
        label: kinase_strep
        expression: high
        fused: false
        chain:
          - tag: Strep-II
          - cleavage_site: TEV
          - gene:
              id: "your_kinase_gene"  # Replace with actual kinase gene ID
              source: uniprot

    - terminator: rrnB_T1

  constraints:
    assembly: golden_gate
    enzyme: BsaI
    codon_optimization: local
    gc_window: [0.35, 0.65]
    max_homopolymer: 6

  synthesis:
    vendor: twist
    budget_per_gene: 400
    max_turnaround_days: 21