```yaml
construct:
  name: human_p53_genomic_expression
  host: e_coli

  backbone:
    catalog_vector: "pET-28b(+)"

  cassette:
    - promoter: T7lac

    - cistron:
        label: p53_genomic
        expression: high
        chain:
          - tag: 6xHis
          - gene:
              id: TP53
              source: uniprot
              genomic: true  # includes introns and regulatory sequences

    - terminator: rrnB_T1

  constraints:
    assembly: golden_gate
    enzyme: BsaI
    codon_optimization: local
    gc_window: [0.35, 0.65]
    max_homopolymer: 6

  synthesis:
    vendor: twist
    budget_per_gene: 400
    max_turnaround_days: 21
```