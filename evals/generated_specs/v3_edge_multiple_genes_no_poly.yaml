```yaml
construct:
  name: tri_fluorescent_reporter
  host: e_coli

  backbone:
    resistance: kanamycin
    ori: pBR322
    source: addgene

  cassette:
    - promoter: T7lac

    - cistron:
        label: green_reporter
        expression: high
        fused: false
        gene:
          id: GFP
          source: fpbase

    - spacer: 30

    - cistron:
        label: red_reporter
        expression: high
        fused: false
        gene:
          id: mCherry
          source: fpbase

    - spacer: 30

    - cistron:
        label: blue_reporter
        expression: high
        fused: false
        gene:
          id: mTagBFP2
          source: fpbase

    - terminator: rrnB_T1

  constraints:
    assembly: golden_gate
    enzyme: BsaI
    codon_optimization: local
    gc_window: [0.35, 0.65]
    max_homopolymer: 6

  synthesis:
    vendor: twist
    budget_per_gene: 400
    max_turnaround_days: 21
```