```yaml
construct:
  name: "GFP_yeast_expression"
  host: e_coli  # Note: construct_compiler doesn't support yeast hosts, using E. coli for synthesis then transformation

  backbone:
    catalog_vector: "pET-28b(+)"

  cassette:
    - promoter: T7lac  # Note: In actual yeast transformation, this would need to be replaced with GAL1 or ADH1 promoter

    - cistron:
        label: target
        expression: high
        gene:
          id: sfGFP
          source: fpbase

    - terminator: rrnB_T1  # Note: In actual yeast, this would need to be replaced with CYC1 or ADH1 terminator

  constraints:
    assembly: golden_gate
    enzyme: BsaI
    codon_optimization: local
    gc_window: [0.35, 0.65]
    max_homopolymer: 6

  synthesis:
    vendor: twist
    budget_per_gene: 400
    max_turnaround_days: 21
```