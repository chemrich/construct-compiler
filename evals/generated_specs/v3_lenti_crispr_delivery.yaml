```yaml
construct:
  name: lentiviral_Cas9_puromycin_selection
  host: HEK293

  backbone:
    catalog_vector: "pTwist CMV"
    resistance: ampicillin

  cassette:
    - promoter: EF1_alpha

    - cistron:
        label: Cas9
        expression: high
        chain:
          - gene:
              id: P10775  # Cas9 from S. pyogenes
              source: uniprot
          - linker:
              type: GS_flexible
              repeats: 1
          - tag: FLAG

    - spacer: 30

    - promoter: CMV

    - cistron:
        label: puromycin_resistance
        expression: medium
        fused: false
        gene:
          id: P13249  # puromycin N-acetyltransferase
          source: uniprot

    - terminator: rrnB_T1

  constraints:
    assembly: golden_gate
    enzyme: BsaI
    codon_optimization: local
    gc_window: [0.35, 0.65]
    max_homopolymer: 6

  synthesis:
    vendor: twist
    budget_per_gene: 800
    max_turnaround_days: 21
```