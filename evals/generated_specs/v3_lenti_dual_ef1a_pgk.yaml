```yaml
construct:
  name: dual_promoter_lentiviral_EF1a_PGK_mCherry
  host: HEK293

  backbone:
    catalog_vector: "pTwist Lenti"

  cassette:
    - promoter: EF1_alpha

    - cistron:
        label: GOI
        expression: high
        chain:
          - gene:
              id: placeholder_GOI
              source: uniprot

    - promoter: PGK

    - cistron:
        label: mCherry_reporter
        expression: medium
        fused: false
        gene:
          id: mCherry
          source: fpbase

    - terminator: rrnB_T1

  constraints:
    assembly: golden_gate
    enzyme: BsaI
    codon_optimization: local
    gc_window: [0.35, 0.65]
    max_homopolymer: 6

  synthesis:
    vendor: twist
    budget_per_gene: 400
    max_turnaround_days: 21
```