```yaml
construct:
  name: "His_tagged_kinase_lentiviral"
  host: HEK293

  backbone:
    catalog_vector: "pTwist CMV"  # Will need lentiviral backbone modification
    # Note: Standard mammalian backbone - lentiviral elements would need to be added separately

  cassette:
    - promoter: EF1_alpha

    - cistron:
        label: kinase
        expression: medium
        chain:
          - tag: 6xHis
          - gene:
              protein_sequence: "PLACEHOLDER_KINASE_SEQUENCE"  # Specific kinase sequence needed

    - terminator: rrnB_T1

  constraints:
    assembly: golden_gate
    enzyme: BsaI
    codon_optimization: local
    gc_window: [0.35, 0.65]
    max_homopolymer: 6

  synthesis:
    vendor: twist
    budget_per_gene: 400
    max_turnaround_days: 21
```