```yaml
construct:
  name: "lentiviral_triple_fluorescent_reporter"
  host: HEK293

  backbone:
    catalog_vector: "pTwist Lenti"

  cassette:
    - promoter: EF1_alpha

    - cistron:
        label: green_reporter
        expression: high
        gene:
          id: mClover3
          source: fpbase

    - spacer: 30

    - cistron:
        label: red_reporter
        expression: high
        fused: false
        gene:
          id: mScarlet
          source: fpbase

    - spacer: 30

    - cistron:
        label: blue_reporter
        expression: high
        fused: false
        gene:
          id: mTagBFP2
          source: fpbase

    - terminator: rrnB_T1

  constraints:
    assembly: golden_gate
    enzyme: BsaI
    codon_optimization: local
    gc_window: [0.35, 0.65]
    max_homopolymer: 6

  synthesis:
    vendor: twist
    budget_per_gene: 400
    max_turnaround_days: 21
```