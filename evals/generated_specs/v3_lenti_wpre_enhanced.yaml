```yaml
construct:
  name: lentiviral_mEGFP_WPRE
  host: HEK293

  backbone:
    catalog_vector: "pLenti"
    source: addgene

  cassette:
    - promoter: CMV

    - cistron:
        label: target
        expression: high
        gene:
          id: mEGFP
          source: fpbase

    - regulatory_element: WPRE  # Woodchuck Hepatitis Virus Posttranscriptional Regulatory Element

    - terminator: SV40_polyA

  constraints:
    assembly: gateway
    codon_optimization: human
    gc_window: [0.40, 0.60]
    max_homopolymer: 6

  synthesis:
    vendor: twist
    budget_per_gene: 500
    max_turnaround_days: 21
```