```yaml
construct:
  name: "NLS_mCherry_nuclear_segmentation"
  host: HEK293

  backbone:
    catalog_vector: "pTwist CMV"

  cassette:
    - promoter: CMV

    - cistron:
        label: nuclear_marker
        expression: medium
        chain:
          - tag: NLS
          - linker:
              type: GS_flexible
              repeats: 1
          - gene:
              id: mCherry
              source: fpbase

    - terminator: rrnB_T1

  constraints:
    assembly: golden_gate
    enzyme: BsaI
    codon_optimization: local
    gc_window: [0.35, 0.65]
    max_homopolymer: 6

  synthesis:
    vendor: twist
    budget_per_gene: 400
    max_turnaround_days: 21
```