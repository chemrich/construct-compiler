```yaml
construct:
  name: "HEK293T_mScarlet_puromycin_stable"
  host: HEK293

  backbone:
    catalog_vector: "pTwist CMV"
    resistance: ampicillin  # for bacterial propagation

  cassette:
    - promoter: CMV

    - cistron:
        label: fluorescent_reporter
        expression: high
        gene:
          id: mScarlet
          source: fpbase

    - spacer: 50

    - promoter: EF1_alpha

    - cistron:
        label: selection_marker
        expression: medium
        fused: false
        gene:
          id: P00552  # puromycin N-acetyltransferase
          source: uniprot

    - terminator: rrnB_T1

  constraints:
    assembly: golden_gate
    enzyme: BsaI
    codon_optimization: local
    gc_window: [0.35, 0.65]
    max_homopolymer: 6

  synthesis:
    vendor: twist
    budget_per_gene: 400
    max_turnaround_days: 21
```