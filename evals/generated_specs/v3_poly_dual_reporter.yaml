```yaml
construct:
  name: "NanoLuc_mScarlet_bicistronic_reporter"
  host: e_coli_bl21

  backbone:
    catalog_vector: "pET-28b(+)"

  cassette:
    - promoter: T7lac

    - cistron:
        label: luminescence
        expression: high
        gene:
          id: P14542
          source: uniprot

    - spacer: 30

    - cistron:
        label: fluorescence
        expression: low
        fused: false
        gene:
          id: mScarlet
          source: fpbase

    - terminator: rrnB_T1

  constraints:
    assembly: golden_gate
    enzyme: BsaI
    codon_optimization: local
    gc_window: [0.35, 0.65]
    max_homopolymer: 6

  synthesis:
    vendor: twist
    budget_per_gene: 400
    max_turnaround_days: 21
