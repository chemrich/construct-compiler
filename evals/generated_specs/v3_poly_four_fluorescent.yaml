```yaml
construct:
  name: "multicolor_four_cistron_imaging"
  host: e_coli

  backbone:
    resistance: kanamycin
    ori: pBR322
    source: addgene

  cassette:
    - promoter: T7lac

    - cistron:
        label: green
        expression: medium
        gene:
          id: mClover3
          source: fpbase

    - spacer: 30

    - cistron:
        label: red
        expression: medium
        fused: false
        gene:
          id: mRuby3
          source: fpbase

    - spacer: 30

    - cistron:
        label: blue
        expression: medium
        fused: false
        gene:
          id: mTagBFP2
          source: fpbase

    - spacer: 30

    - cistron:
        label: far_red
        expression: medium
        fused: false
        gene:
          id: mKatushka2
          source: fpbase

    - terminator: rrnB_T1

  constraints:
    assembly: golden_gate
    enzyme: BsaI
    codon_optimization: local
    gc_window: [0.35, 0.65]
    max_homopolymer: 6

  synthesis:
    vendor: twist
    budget_per_gene: 400
    max_turnaround_days: 21
