```yaml
construct:
  name: "DsbC_disulfide_target_coexpression"
  host: e_coli_bl21_de3

  backbone:
    catalog_vector: "pET-28b(+)"

  cassette:
    - promoter: T7lac

    - cistron:
        label: target
        expression: high
        chain:
          - tag: 6xHis
          - cleavage_site: TEV
          - gene:
              id: P0AEG4  # DsbC from E. coli
              source: uniprot

    - spacer: 30

    - cistron:
        label: disulfide_target
        expression: medium
        fused: false
        gene:
          # User needs to specify their target protein
          protein_sequence: "REPLACE_WITH_TARGET_PROTEIN_SEQUENCE"

    - terminator: rrnB_T1

  constraints:
    assembly: golden_gate
    enzyme: BsaI
    codon_optimization: local
    gc_window: [0.35, 0.65]
    max_homopolymer: 6

  synthesis:
    vendor: twist
    budget_per_gene: 400
    max_turnaround_days: 21
