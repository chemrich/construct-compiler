```yaml
construct:
  name: "kinase_phosphatase_coexpression"
  host: e_coli_bl21_de3

  backbone:
    catalog_vector: "pET-28b(+)"

  cassette:
    - promoter: T7lac

    - cistron:
        label: kinase
        expression: high
        chain:
          - tag: 6xHis
          - cleavage_site: TEV
          - gene:
              id: P0A9T4  # Example kinase from E. coli
              source: uniprot

    - spacer: 30

    - cistron:
        label: phosphatase
        expression: low
        fused: false
        gene:
          id: P37689  # Example phosphatase from E. coli
          source: uniprot

    - terminator: rrnB_T1

  constraints:
    assembly: golden_gate
    enzyme: BsaI
    codon_optimization: local
    gc_window: [0.35, 0.65]
    max_homopolymer: 6

  synthesis:
    vendor: twist
    budget_per_gene: 400
    max_turnaround_days: 21
```