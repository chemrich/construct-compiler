```yaml
construct:
  name: "sortase_A_substrate_bicistronic"
  host: e_coli_bl21_de3

  backbone:
    catalog_vector: "pET-28b(+)"

  cassette:
    - promoter: T7lac

    - cistron:
        label: sortase_A
        expression: high
        chain:
          - tag: 6xHis
          - gene:
              id: P59110
              source: uniprot

    - spacer: 30

    - cistron:
        label: substrate
        expression: medium
        fused: false
        chain:
          - gene:
              id: mEGFP
              source: fpbase
          - protein_sequence: "LPETGG"  # sortase recognition motif

    - terminator: rrnB_T1

  constraints:
    assembly: golden_gate
    enzyme: BsaI
    codon_optimization: local
    gc_window: [0.35, 0.65]
    max_homopolymer: 6

  synthesis:
    vendor: twist
    budget_per_gene: 400
    max_turnaround_days: 21
