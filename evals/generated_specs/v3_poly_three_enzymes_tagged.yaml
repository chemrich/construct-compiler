```yaml
construct:
  name: three_enzyme_pathway_ABC
  host: e_coli

  backbone:
    resistance: kanamycin
    ori: pBR322
    source: addgene

  cassette:
    - promoter: T7lac

    - cistron:
        label: enzyme_A
        expression: high
        chain:
          - tag: 6xHis
          - gene:
              id: enzyme_A
              source: uniprot

    - spacer: 30

    - cistron:
        label: enzyme_B
        expression: medium
        fused: false
        chain:
          - tag: Strep-II
          - gene:
              id: enzyme_B
              source: uniprot

    - spacer: 30

    - cistron:
        label: enzyme_C
        expression: low
        fused: false
        chain:
          - tag: FLAG
          - gene:
              id: enzyme_C
              source: uniprot

    - terminator: rrnB_T1

  constraints:
    assembly: golden_gate
    enzyme: BsaI
    codon_optimization: local
    gc_window: [0.35, 0.65]
    max_homopolymer: 6

  synthesis:
    vendor: twist
    budget_per_gene: 400
    max_turnaround_days: 21
```