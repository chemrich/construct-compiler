```yaml
construct:
  name: "dual_luciferase_reporter"
  host: e_coli

  backbone:
    catalog_vector: "pET-28b(+)"

  cassette:
    - promoter: T7lac

    - cistron:
        label: firefly_luciferase
        expression: high
        gene:
          id: P08659
          source: uniprot

    - spacer: 30

    - cistron:
        label: renilla_luciferase
        expression: low
        fused: false
        gene:
          id: O47077
          source: uniprot

    - terminator: rrnB_T1

  constraints:
    assembly: golden_gate
    enzyme: BsaI
    codon_optimization: local
    gc_window: [0.35, 0.65]
    max_homopolymer: 6

  synthesis:
    vendor: twist
    budget_per_gene: 400
    max_turnaround_days: 21
```