```yaml
construct:
  name: "enzyme_library_gfp11_solubility_screen"
  host: e_coli

  backbone:
    resistance: kanamycin
    ori: pBR322
    source: addgene

  cassette:
    - promoter: T7lac

    - cistron:
        label: enzyme_library
        expression: high
        chain:
          - gene:
              id: YOUR_ENZYME  # Replace with your enzyme ID/sequence
              source: uniprot
          - linker:
              type: GS_flexible
              repeats: 2
          - tag: GFP11

    - terminator: rrnB_T1

  constraints:
    assembly: golden_gate
    enzyme: BsaI
    codon_optimization: local
    gc_window: [0.35, 0.65]
    max_homopolymer: 6

  synthesis:
    vendor: twist
    budget_per_gene: 400
    max_turnaround_days: 21
