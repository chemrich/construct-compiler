```yaml
construct:
  name: "nanobody_cytoplasmic_his"
  host: e_coli_bl21_de3

  backbone:
    catalog_vector: "pET-28b(+)"

  cassette:
    - promoter: T7lac

    - cistron:
        label: nanobody
        expression: high
        chain:
          - tag: 6xHis
          - gene:
              protein_sequence: "PLACEHOLDER_NANOBODY_SEQUENCE"  # Replace with your nanobody sequence

    - terminator: rrnB_T1

  constraints:
    assembly: golden_gate
    enzyme: BsaI
    codon_optimization: local
    gc_window: [0.35, 0.65]
    max_homopolymer: 6

  synthesis:
    vendor: twist
    budget_per_gene: 400
    max_turnaround_days: 21
