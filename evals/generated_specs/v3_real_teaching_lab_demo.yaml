```yaml
construct:
  name: "mCherry_teaching_expression"
  host: e_coli

  backbone:
    catalog_vector: "pET-28b(+)"

  cassette:
    - promoter: T7lac

    - cistron:
        label: reporter
        expression: high
        gene:
          id: mCherry
          source: fpbase

    - terminator: rrnB_T1

  constraints:
    assembly: golden_gate
    enzyme: BsaI
    codon_optimization: local
    gc_window: [0.35, 0.65]
    max_homopolymer: 6

  synthesis:
    vendor: idt
    budget_per_gene: 200
    max_turnaround_days: 14
```