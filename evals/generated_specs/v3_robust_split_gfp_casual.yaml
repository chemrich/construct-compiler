construct:
  name: "split_GFP_protein_complementation"
  host: e_coli_bl21_de3

  backbone:
    catalog_vector: "pET-28b(+)"

  cassette:
    - promoter: T7lac

    - cistron:
        label: target_with_GFP11
        expression: high
        chain:
          - tag: 6xHis
          - cleavage_site: TEV
          - gene:
              protein_sequence: "PLACEHOLDER_YOUR_PROTEIN_SEQUENCE"  # Replace with your actual protein sequence
          - linker:
              type: GS_flexible
              repeats: 2
          - tag: GFP11  # Small 16 amino acid GFP11 tag for split-GFP complementation

    - spacer: 30

    - cistron:
        label: GFP1_10_detector
        expression: medium
        fused: false
        gene:
          id: GFP1-10  # Large fragment of split GFP that complements GFP11
          source: fpbase

    - terminator: rrnB_T1

  constraints:
    assembly: golden_gate
    enzyme: BsaI
    codon_optimization: local
    gc_window: [0.35, 0.65]
    max_homopolymer: 6

  synthesis:
    vendor: twist
    budget_per_gene: 400
    max_turnaround_days: 21