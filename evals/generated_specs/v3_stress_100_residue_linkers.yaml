```yaml
construct:
  name: flexible_fusion_protein
  host: e_coli

  backbone:
    catalog_vector: "pET-28b(+)"

  cassette:
    - promoter: T7lac

    - cistron:
        label: fusion_protein
        expression: high
        chain:
          - tag: 6xHis
          - cleavage_site: TEV
          - gene:
              id: mEGFP
              source: fpbase
          - linker:
              type: GS_flexible
              repeats: 20  # 20 repeats of GGGGS = 100 residues
          - gene:
              id: mScarlet
              source: fpbase
          - linker:
              type: GS_flexible
              repeats: 20
          - gene:
              id: mTagBFP2
              source: fpbase

    - terminator: rrnB_T1

  constraints:
    assembly: golden_gate
    enzyme: BsaI
    codon_optimization: local
    gc_window: [0.35, 0.65]
    max_homopolymer: 6

  synthesis:
    vendor: twist
    budget_per_gene: 400
    max_turnaround_days: 21
```