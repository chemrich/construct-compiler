construct:
  name: "mEGFP_MBP_fusion_comparison"
  host: e_coli

  backbone:
    catalog_vector: "pET-28b(+)"

  cassette:
    - promoter: T7lac

    - cistron:
        label: MBP_fusion
        expression: high
        chain:
          - tag: 6xHis
          - cleavage_site: TEV
          - solubility_tag: MBP
          - linker:
              type: GS_flexible
              repeats: 2
          - gene:
              id: mEGFP
              source: fpbase

    - spacer: 30

    - cistron:
        label: GST_fusion
        expression: high
        fused: false
        chain:
          - tag: 6xHis
          - cleavage_site: TEV
          - solubility_tag: GST
          - linker:
              type: GS_flexible
              repeats: 2
          - gene:
              id: mEGFP
              source: fpbase

    - spacer: 30

    - cistron:
        label: SUMO_fusion
        expression: high
        fused: false
        chain:
          - tag: 6xHis
          - cleavage_site: TEV
          - solubility_tag: SUMO
          - linker:
              type: GS_flexible
              repeats: 2
          - gene:
              id: mEGFP
              source: fpbase

    - spacer: 30

    - cistron:
        label: Trx_fusion
        expression: high
        fused: false
        chain:
          - tag: 6xHis
          - cleavage_site: TEV
          - solubility_tag: Trx
          - linker:
              type: GS_flexible
              repeats: 2
          - gene:
              id: mEGFP
              source: fpbase

    - terminator: rrnB_T1

  constraints:
    assembly: golden_gate
    enzyme: BsaI
    codon_optimization: local
    gc_window: [0.35, 0.65]
    max_homopolymer: 6

  synthesis:
    vendor: twist
    budget_per_gene: 400
    max_turnaround_days: 21