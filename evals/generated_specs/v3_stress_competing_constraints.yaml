```yaml
construct:
  name: his_tagged_enzyme_optimized
  host: e_coli_bl21_de3

  backbone:
    catalog_vector: "pET-28b(+)"

  cassette:
    - promoter: T7lac

    - cistron:
        label: target_enzyme
        expression: high
        chain:
          - tag: 6xHis
          - gene:
            # Add your specific enzyme gene details here
            id: your_enzyme_gene
            source: uniprot

    - terminator: rrnB_T1

  constraints:
    assembly: golden_gate
    enzyme: BsaI
    codon_optimization: local
    gc_window: [0.35, 0.65]
    max_homopolymer: 6

  synthesis:
    vendor: idt
    budget_per_gene: 400
    max_turnaround_days: 14
