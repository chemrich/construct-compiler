```yaml
construct:
  name: pulse_chase_GFP_ssrA_mCherry_bicistronic
  host: e_coli

  backbone:
    catalog_vector: "pET-28b(+)"

  cassette:
    - promoter: T7lac

    - cistron:
        label: pulse_target
        expression: high
        chain:
          - gene:
              id: mEGFP
              source: fpbase
          - degron:
              type: ssrA
              variant: strong  # strong degradation signal

    - spacer: 30

    - cistron:
        label: stable_control
        expression: medium
        fused: false
        gene:
          id: mCherry
          source: fpbase

    - terminator: rrnB_T1

  constraints:
    assembly: golden_gate
    enzyme: BsaI
    codon_optimization: local
    gc_window: [0.35, 0.65]
    max_homopolymer: 6

  synthesis:
    vendor: twist
    budget_per_gene: 400
    max_turnaround_days: 21
```