```yaml
construct:
  name: disulfide_bonded_protein_shuffle_compatible
  host: e_coli_bl21

  backbone:
    catalog_vector: "pET-28b(+)"

  cassette:
    - promoter: T7lac

    - cistron:
        label: target
        expression: medium  # Lower expression to aid proper folding
        chain:
          - tag: 6xHis
          - cleavage_site: TEV
          - solubility_tag: MBP  # Maltose binding protein aids solubility
          - linker:
              type: GS_flexible
              repeats: 2
          - gene:
              protein_sequence: ""  # Example protein sequence with cysteines for disulfide bonds

    - terminator: rrnB_T1

  constraints:
    assembly: golden_gate
    enzyme: BsaI
    codon_optimization: local  # SHuffle strains benefit from optimized codons
    gc_window: [0.35, 0.65]
    max_homopolymer: 6

  synthesis:
    vendor: twist
    budget_per_gene: 600  # Higher budget for complex protein
    max_turnaround_days: 21
