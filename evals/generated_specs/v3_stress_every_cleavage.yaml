construct:
  name: "his_tev_gfp"
  host: e_coli_bl21

  backbone:
    catalog_vector: "pET-28b(+)"

  cassette:
    - promoter: T7lac

    - cistron:
        label: target
        expression: high
        chain:
          - tag: 6xHis
          - cleavage_site: TEV
          - gene:
              id: mEGFP
              source: fpbase

    - terminator: rrnB_T1

  constraints:
    assembly: golden_gate
    enzyme: BsaI
    codon_optimization: local
    gc_window: [0.35, 0.65]
    max_homopolymer: 6

  synthesis:
    vendor: twist
    budget_per_gene: 400
    max_turnaround_days: 21

