construct:
  name: "protein_triple_codon_optimization_ecoli"
  host: e_coli

  backbone:
    catalog_vector: "pET-28b(+)"

  cassette:
    - promoter: T7lac

    - cistron:
        label: target
        expression: high
        chain:
          - tag: 6xHis
          - gene:
              protein_sequence: "MVSKGEELFTGVVPILVELDGDVNGHKFSVSGEGEGDATYGKLTLKFICTTGKLPVPWPTLVTTLTYGVQCFSRYPDHMKQHDFFKSAMPEGYVQERTIFFKDDGNYKTRAEVKFEGDTLVNRIELKGIDFKEDGNILGHKLEYNYNSHNVYIMADKQKNGIKVNFKIRHNIEDGSVQLADHYQQNTPIGDGPVLLPDNHYLSTQSALSKDPNEKRDHMVLLEFVTAAGITLGMDELYK"
              source: manual

    - terminator: rrnB_T1

  constraints:
    assembly: golden_gate
    enzyme: BsaI
    codon_optimization: e_coli
    gc_window: [0.35, 0.65]
    max_homopolymer: 6

  synthesis:
    vendor: twist
    budget_per_gene: 400
    max_turnaround_days: 21

