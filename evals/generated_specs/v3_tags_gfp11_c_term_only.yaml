```yaml
construct:
  name: "enzyme_with_gfp11_tag"
  host: e_coli

  backbone:
    resistance: kanamycin
    ori: pBR322
    source: addgene

  cassette:
    - promoter: T7lac

    - cistron:
        label: target
        expression: high
        chain:
          - gene:
              id: "your_enzyme"  # Replace with actual enzyme ID
              source: uniprot
          - tag: GFP11

    - terminator: rrnB_T1

  constraints:
    assembly: golden_gate
    enzyme: BsaI
    codon_optimization: local
    gc_window: [0.35, 0.65]
    max_homopolymer: 6

  synthesis:
    vendor: twist
    budget_per_gene: 400
    max_turnaround_days: 21
