```yaml
construct:
  name: "tripartite_split_GFP_bait_prey_bicistronic"
  host: e_coli

  backbone:
    catalog_vector: "pET-28b(+)"

  cassette:
    - promoter: T7lac

    - cistron:
        label: bait_GFP10
        expression: high
        chain:
          - tag: 6xHis
          - gene:
              protein_sequence: "PLACEHOLDER_BAIT_PROTEIN_SEQUENCE"  # Replace with actual bait protein sequence
          - linker:
              type: GS_flexible
              repeats: 2
          - gene:
              protein_sequence: "RSYQRYPARELLHYRNQGCTYVFKRHDRNQDMVVESGGMVDYQVESVL"  # GFP10 fragment
              
    - spacer: 30

    - cistron:
        label: prey_GFP11
        expression: high
        fused: false
        chain:
          - gene:
              protein_sequence: "PLACEHOLDER_PREY_PROTEIN_SEQUENCE"  # Replace with actual prey protein sequence
          - linker:
              type: GS_flexible
              repeats: 2
          - gene:
              protein_sequence: "RDHMVLHEYVNAAGIT"  # GFP11 fragment

    - terminator: rrnB_T1

  constraints:
    assembly: golden_gate
    enzyme: BsaI
    codon_optimization: local
    gc_window: [0.35, 0.65]
    max_homopolymer: 6

  synthesis:
    vendor: twist
    budget_per_gene: 400
    max_turnaround_days: 21
