    expect:
      min_cistrons: 1
    notes: "Very vague — LLM must pick a specific FP and reasonable defaults"

  - id: edge_wrong_terminology
    category: edge_cases
    difficulty: medium
    prompt: "Put a His-tag on green fluorescent protein and stick it in a plasmid for bacteria."
    expect:
      host: e_coli
      min_cistrons: 1
      must_have_parts: [PurificationTag, CDS]
      must_pass: true
    notes: "Informal language — 'stick it in a plasmid', 'bacteria' instead of E. coli"

  - id: edge_contradictory
    category: edge_cases
    difficulty: hard
    prompt: "Express GFP in E. coli using a CMV promoter."
    expect:
      min_cistrons: 1
    notes: "CMV is a mammalian promoter — should the LLM flag this or substitute a bacterial promoter?"

  - id: edge_no_tags
