# Example: His-TEV-MBP-mEGFP fusion with mScarlet reporter
# A typical E. coli expression construct for soluble protein production
# with a polycistronic fluorescent reporter.

construct:
  name: "HisTEV-MBP-mEGFP_with_mScarlet_reporter"
  host: e_coli_bl21

  backbone:
    source: addgene
    resistance: kanamycin
    ori: pBR322

  cassette:
    - promoter: T7lac

    # Cistron 1: Target protein with purification/solubility tags
    - cistron:
        label: target
        expression: high
        chain:
          - tag: 6xHis
          - cleavage_site: TEV
          - solubility_tag: MBP
          - linker:
              type: GS_flexible
              repeats: 2
          - gene:
              id: mEGFP
              source: fpbase

    # Cistron 2: Non-fused fluorescent reporter (low expression)
    - spacer: 30
    - cistron:
        label: reporter
        expression: low
        fused: false
        gene:
          id: mScarlet
          source: fpbase

    - terminator: rrnB_T1

  constraints:
    assembly: golden_gate
    enzyme: BsaI
    codon_optimization: local
    gc_window: [0.35, 0.65]
    max_homopolymer: 6

  synthesis:
    vendor: twist
    budget_per_gene: 400
    max_turnaround_days: 21
