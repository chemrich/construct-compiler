<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Construct Compiler</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
    <script src="https://unpkg.com/seqviz"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: #0f1117; color: #e1e4e8; }
        :root {
            --bg: #0f1117; --bg-card: #161b22; --bg-input: #1c2129;
            --border: #30363d; --text: #e1e4e8; --text-muted: #8b949e;
            --accent: #58a6ff; --accent-green: #3fb950; --accent-orange: #d29922;
            --accent-red: #f85149; --accent-purple: #bc8cff;
        }
    </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const { useState, useCallback, useMemo, useRef, useEffect } = React;

// --- Color palette for part types ---
const PART_COLORS = {
    Promoter: '#3fb950', RBS: '#58a6ff', CDS: '#d29922',
    PurificationTag: '#bc8cff', SolubilityTag: '#f778ba', CleavageSite: '#f85149',
    Linker: '#8b949e', Terminator: '#8a5c3a', Spacer: '#484f58', Backbone: '#30363d',
};

const PART_LABELS = {
    Promoter: 'P', RBS: 'R', CDS: 'CDS', PurificationTag: 'Tag',
    SolubilityTag: 'Sol', CleavageSite: '/', Linker: '~', Terminator: 'T', Spacer: '...',
};

// --- Linear construct diagram (SBOL-ish symbology) ---
function LinearConstructDiagram({ promoter, terminator, cistrons, useCatalog, catalogVector }) {
    // Build an ordered list of parts from the current UI state
    const parts = useMemo(() => {
        const p = [];
        // Promoter
        p.push({ type: 'promoter', label: promoter || 'P', color: PART_COLORS.Promoter });

        cistrons.forEach((c, ci) => {
            // Inter-cistron link
            if (ci > 0) {
                const link = c.upstreamLink || 'spacer';
                if (link === 'spacer') {
                    p.push({ type: 'spacer', label: '···', color: PART_COLORS.Spacer });
                    p.push({ type: 'rbs', label: 'RBS', color: PART_COLORS.RBS });
                } else {
                    p.push({ type: '2a', label: link, color: '#e06c75' });
                }
            } else {
                // First cistron gets an RBS
                p.push({ type: 'rbs', label: 'RBS', color: PART_COLORS.RBS });
            }

            // Chain elements
            if (c.nTag) p.push({ type: 'tag', label: c.nTag, color: PART_COLORS.PurificationTag });
            if (c.cleavage) p.push({ type: 'cleavage', label: c.cleavage, color: PART_COLORS.CleavageSite });
            if (c.solTag) p.push({ type: 'soltag', label: c.solTag, color: PART_COLORS.SolubilityTag });
            if (c.linker) p.push({ type: 'linker', label: c.linker.replace(/_/g, ' '), color: PART_COLORS.Linker });

            // Gene (CDS)
            p.push({ type: 'cds', label: c.geneId || c.label, color: PART_COLORS.CDS });
        });

        // Terminator
        p.push({ type: 'terminator', label: terminator || 'T', color: PART_COLORS.Terminator });
        return p;
    }, [promoter, terminator, cistrons]);

    // Layout constants
    const pad = 12;
    const partH = 28;
    const labelH = 14;
    const rowH = partH + labelH + 6;
    const svgW = 380;

    // Size each part proportionally by type
    const sizeWeight = (t) => {
        switch (t) {
            case 'cds': return 3;
            case 'soltag': return 2;
            case 'promoter': return 1.5;
            case 'terminator': return 1.2;
            case 'tag': return 1.2;
            case 'cleavage': return 0.8;
            case 'rbs': return 0.7;
            case 'linker': return 1;
            case 'spacer': return 0.6;
            case '2a': return 1;
            default: return 1;
        }
    };

    const totalWeight = parts.reduce((s, p) => s + sizeWeight(p.type), 0);
    const gap = 1;
    const usableW = svgW - 2 * pad - (parts.length - 1) * gap;

    // Compute x positions and widths
    let cx = pad;
    const layout = parts.map((p) => {
        const w = Math.max(12, (sizeWeight(p.type) / totalWeight) * usableW);
        const item = { ...p, x: cx, w };
        cx += w + gap;
        return item;
    });

    // Wrap into rows if needed
    const maxRowW = svgW - 2 * pad;
    const rows = [[]];
    let rowW = 0;
    layout.forEach(item => {
        if (rowW + item.w > maxRowW + 10 && rows[rows.length - 1].length > 0) {
            rows.push([]);
            rowW = 0;
        }
        rows[rows.length - 1].push({ ...item, x: pad + rowW });
        rowW += item.w + gap;
    });

    const svgH = rows.length * rowH + 8;

    // SVG shape renderers
    const renderPart = (p, y) => {
        const midY = y + partH / 2;
        const arrowTip = 5;

        if (p.type === 'promoter') {
            // Bent arrow (SBOL promoter)
            return (
                <g key={`part-${p.x}-${y}`}>
                    <line x1={p.x + p.w * 0.3} y1={y + partH} x2={p.x + p.w * 0.3} y2={y + 4} stroke={p.color} strokeWidth={2.5} />
                    <line x1={p.x + p.w * 0.3} y1={y + 4} x2={p.x + p.w - 2} y2={y + 4} stroke={p.color} strokeWidth={2.5} />
                    <polygon points={`${p.x + p.w},${y + 4} ${p.x + p.w - 6},${y} ${p.x + p.w - 6},${y + 8}`} fill={p.color} />
                </g>
            );
        }

        if (p.type === 'terminator') {
            // T-bar (SBOL terminator)
            return (
                <g key={`part-${p.x}-${y}`}>
                    <line x1={p.x + p.w / 2} y1={y + partH} x2={p.x + p.w / 2} y2={y + 4} stroke={p.color} strokeWidth={2.5} />
                    <line x1={p.x + 3} y1={y + 4} x2={p.x + p.w - 3} y2={y + 4} stroke={p.color} strokeWidth={3} />
                </g>
            );
        }

        if (p.type === 'rbs') {
            // Semicircle (SBOL RBS)
            const cx = p.x + p.w / 2;
            const r = Math.min(p.w / 2 - 1, partH / 2 - 2);
            return (
                <g key={`part-${p.x}-${y}`}>
                    <path d={`M ${cx - r} ${y + partH} A ${r} ${r} 0 0 1 ${cx + r} ${y + partH}`}
                          fill={p.color} opacity={0.85} />
                </g>
            );
        }

        if (p.type === 'cds') {
            // Pentagon / arrow block (SBOL CDS)
            const pts = [
                `${p.x},${y}`,
                `${p.x + p.w - arrowTip},${y}`,
                `${p.x + p.w},${midY}`,
                `${p.x + p.w - arrowTip},${y + partH}`,
                `${p.x},${y + partH}`,
            ].join(' ');
            return <polygon key={`part-${p.x}-${y}`} points={pts} fill={p.color} opacity={0.85} rx={2} />;
        }

        if (p.type === 'spacer') {
            // Dashed line
            return (
                <line key={`part-${p.x}-${y}`} x1={p.x + 2} y1={midY} x2={p.x + p.w - 2} y2={midY}
                      stroke={p.color} strokeWidth={2} strokeDasharray="3,3" />
            );
        }

        if (p.type === '2a') {
            // Diamond
            const cx = p.x + p.w / 2;
            const pts = [
                `${cx},${y + 2}`,
                `${p.x + p.w - 2},${midY}`,
                `${cx},${y + partH - 2}`,
                `${p.x + 2},${midY}`,
            ].join(' ');
            return <polygon key={`part-${p.x}-${y}`} points={pts} fill={p.color} opacity={0.85} />;
        }

        if (p.type === 'cleavage') {
            // Scissors / notch — thin vertical bar with notch
            const cx = p.x + p.w / 2;
            return (
                <g key={`part-${p.x}-${y}`}>
                    <rect x={p.x} y={y} width={p.w} height={partH} fill={p.color} opacity={0.15} rx={2} />
                    <line x1={cx} y1={y} x2={cx} y2={y + partH} stroke={p.color} strokeWidth={2} />
                    <line x1={cx - 4} y1={midY - 3} x2={cx + 4} y2={midY + 3} stroke={p.color} strokeWidth={1.5} />
                    <line x1={cx - 4} y1={midY + 3} x2={cx + 4} y2={midY - 3} stroke={p.color} strokeWidth={1.5} />
                </g>
            );
        }

        // Default: rounded rectangle (tags, solubility tags, linkers)
        return (
            <rect key={`part-${p.x}-${y}`} x={p.x} y={y} width={p.w} height={partH}
                  fill={p.color} opacity={0.85} rx={3} />
        );
    };

    return (
        <div style={{ background: '#161b22', border: '1px solid #30363d', borderRadius: 8, padding: '10px 4px 4px', marginBottom: 16 }}>
            <div style={{ fontSize: 10, color: '#8b949e', textTransform: 'uppercase', letterSpacing: 0.5, marginBottom: 4, paddingLeft: 8 }}>
                Expression cassette
            </div>
            <svg width={svgW} height={svgH} viewBox={`0 0 ${svgW} ${svgH}`} style={{ display: 'block', width: '100%' }}>
                {rows.map((row, ri) => {
                    const baseY = ri * rowH;
                    return (
                        <g key={ri}>
                            {/* Backbone line */}
                            {row.length > 0 && (
                                <line x1={row[0].x} y1={baseY + partH} x2={row[row.length - 1].x + row[row.length - 1].w}
                                      y2={baseY + partH} stroke="#30363d" strokeWidth={2} />
                            )}
                            {/* Parts */}
                            {row.map(p => renderPart(p, baseY))}
                            {/* Labels */}
                            {row.map(p => {
                                // Truncate label to fit
                                const maxChars = Math.max(2, Math.floor(p.w / 5.5));
                                const lbl = p.label.length > maxChars ? p.label.slice(0, maxChars - 1) + '…' : p.label;
                                return (
                                    <text key={`lbl-${p.x}-${baseY}`}
                                          x={p.x + p.w / 2} y={baseY + partH + labelH}
                                          fontSize={9} fill="#8b949e" textAnchor="middle"
                                          style={{ fontFamily: '-apple-system, system-ui, sans-serif' }}>
                                        {lbl}
                                    </text>
                                );
                            })}
                        </g>
                    );
                })}
            </svg>
        </div>
    );
}

// --- Plasmid map using seqviz ---
function PlasmidMap({ plasmidMap, onAnnotationClick }) {
    const containerRef = useRef(null);
    const viewerRef = useRef(null);
    const [selectedAnnotation, setSelectedAnnotation] = useState(null);
    const [viewMode, setViewMode] = useState('both'); // 'circular', 'linear', 'both'

    useEffect(() => {
        if (!containerRef.current || !plasmidMap || !plasmidMap.total_length_bp) return;

        // Use real sequence from server (insert + N-filled backbone)
        const seq = plasmidMap.sequence || 'N'.repeat(plasmidMap.total_length_bp);

        // Build seqviz annotations
        const annotations = (plasmidMap.annotations || []).map(a => ({
            name: a.name,
            start: a.start,
            end: a.end,
            direction: a.direction || 1,
            color: a.color || '#666',
        }));

        // Build translation ranges (CDS regions → show amino acid track)
        const translations = (plasmidMap.translations || []).map(t => ({
            start: t.start,
            end: t.end,
            direction: t.direction || 1,
        }));

        // Clear previous viewer
        containerRef.current.innerHTML = '';

        try {
            const viewerOpts = {
                name: plasmidMap.name || 'Construct',
                seq: seq,
                annotations: annotations,
                translations: translations,
                viewer: viewMode,
                showIndex: true,
                style: { height: '100%', width: '100%' },
                onSelection: (sel) => {
                    if (sel) setSelectedAnnotation(sel);
                },
            };

            // Add enzyme cut sites if available
            if (plasmidMap.enzymes && plasmidMap.enzymes.length > 0) {
                viewerOpts.enzymes = plasmidMap.enzymes;
            }

            viewerRef.current = window.seqviz.Viewer(containerRef.current, viewerOpts);
            viewerRef.current.render();
        } catch (e) {
            console.error('seqviz render error:', e);
            containerRef.current.innerHTML = '<div style="color:#f85149;padding:20px">Failed to render plasmid map: ' + e.message + '</div>';
        }

        return () => {
            if (containerRef.current) containerRef.current.innerHTML = '';
        };
    }, [plasmidMap, viewMode]);

    if (!plasmidMap || !plasmidMap.total_length_bp) return null;

    const insertParts = (plasmidMap.annotations || []).filter(a => a.type === 'insert_part');
    const bbFeatures = (plasmidMap.annotations || []).filter(a => a.type === 'backbone_feature');

    return (
        <div>
            {/* Plasmid info header */}
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr 1fr', gap: 10, marginBottom: 16 }}>
                <div style={{ background: '#161b22', borderRadius: 8, padding: 12, border: '1px solid #30363d' }}>
                    <div style={{ fontSize: 11, color: '#8b949e', textTransform: 'uppercase' }}>Total size</div>
                    <div style={{ fontSize: 20, fontWeight: 700 }}>{plasmidMap.total_length_bp.toLocaleString()} bp</div>
                </div>
                <div style={{ background: '#161b22', borderRadius: 8, padding: 12, border: '1px solid #30363d' }}>
                    <div style={{ fontSize: 11, color: '#8b949e', textTransform: 'uppercase' }}>Insert</div>
                    <div style={{ fontSize: 20, fontWeight: 700, color: '#3fb950' }}>{plasmidMap.insert_length_bp.toLocaleString()} bp</div>
                </div>
                <div style={{ background: '#161b22', borderRadius: 8, padding: 12, border: '1px solid #30363d' }}>
                    <div style={{ fontSize: 11, color: '#8b949e', textTransform: 'uppercase' }}>Backbone</div>
                    <div style={{ fontSize: 20, fontWeight: 700, color: '#58a6ff' }}>{plasmidMap.backbone_length_bp.toLocaleString()} bp</div>
                </div>
                <div style={{ background: '#161b22', borderRadius: 8, padding: 12, border: '1px solid #30363d' }}>
                    <div style={{ fontSize: 11, color: '#8b949e', textTransform: 'uppercase' }}>Vector</div>
                    <div style={{ fontSize: 14, fontWeight: 600, color: '#58a6ff' }}>
                        {plasmidMap.backbone_catalog_id || plasmidMap.backbone_name || 'Custom'}
                    </div>
                </div>
            </div>

            {/* View mode toggle */}
            <div style={{ display: 'flex', gap: 4, marginBottom: 8 }}>
                {[['circular', 'Circular'], ['linear', 'Linear'], ['both', 'Both']].map(([mode, label]) => (
                    <button key={mode} onClick={() => setViewMode(mode)}
                            style={{ ...btnStyle, flex: 1, fontSize: 11, padding: '5px 8px',
                                     background: viewMode === mode ? '#238636' : '#21262d',
                                     color: viewMode === mode ? '#fff' : '#8b949e' }}>
                        {label}
                    </button>
                ))}
            </div>

            {/* Seqviz viewer */}
            <div ref={containerRef}
                 style={{ height: viewMode === 'both' ? 550 : viewMode === 'linear' ? 400 : 450,
                          background: '#fff', borderRadius: 8, overflow: 'hidden',
                          border: '1px solid #30363d' }} />

            {/* Selection detail */}
            {selectedAnnotation && selectedAnnotation.name && (
                <div style={{ marginTop: 8, padding: 10, background: '#161b22', border: '1px solid #58a6ff',
                              borderRadius: 6, fontSize: 12 }}>
                    <span style={{ color: '#58a6ff', fontWeight: 600 }}>Selected: </span>
                    <span style={{ color: '#e1e4e8' }}>{selectedAnnotation.name}</span>
                    {selectedAnnotation.start !== undefined && (
                        <span style={{ color: '#8b949e', marginLeft: 8, fontFamily: 'monospace' }}>
                            {selectedAnnotation.start}..{selectedAnnotation.end} ({selectedAnnotation.end - selectedAnnotation.start} bp)
                        </span>
                    )}
                </div>
            )}

            {/* Feature legend */}
            <div style={{ marginTop: 16, display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8 }}>
                {/* Insert features */}
                <div style={{ background: '#161b22', borderRadius: 8, padding: 12, border: '1px solid #30363d' }}>
                    <div style={{ fontSize: 11, color: '#3fb950', fontWeight: 600, textTransform: 'uppercase', marginBottom: 8 }}>
                        Insert features ({insertParts.length})
                    </div>
                    {insertParts.map((a, i) => (
                        <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 4, fontSize: 12 }}>
                            <div style={{ width: 10, height: 10, borderRadius: 2, background: a.color, flexShrink: 0 }} />
                            <span style={{ color: '#e1e4e8', fontWeight: 500 }}>{a.name}</span>
                            <span style={{ color: '#8b949e', marginLeft: 'auto', fontFamily: 'monospace', fontSize: 11 }}>
                                {(a.end - a.start).toLocaleString()} bp
                            </span>
                        </div>
                    ))}
                </div>

                {/* Backbone features */}
                <div style={{ background: '#161b22', borderRadius: 8, padding: 12, border: '1px solid #30363d' }}>
                    <div style={{ fontSize: 11, color: '#58a6ff', fontWeight: 600, textTransform: 'uppercase', marginBottom: 8 }}>
                        Backbone features ({bbFeatures.length})
                        {plasmidMap.backbone_catalog_id && (
                            <span style={{ color: '#8b949e', fontWeight: 400, textTransform: 'none' }}>
                                {' — '}{plasmidMap.backbone_catalog_id}
                            </span>
                        )}
                    </div>
                    {bbFeatures.map((a, i) => (
                        <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 4, fontSize: 12 }}>
                            <div style={{ width: 10, height: 10, borderRadius: 2, background: a.color, flexShrink: 0 }} />
                            <span style={{ color: '#e1e4e8', fontWeight: 500 }}>{a.name}</span>
                            <span style={{ color: '#8b949e', marginLeft: 'auto', fontFamily: 'monospace', fontSize: 11 }}>
                                {(a.end - a.start).toLocaleString()} bp
                            </span>
                        </div>
                    ))}
                    {plasmidMap.backbone_resistance && (
                        <div style={{ marginTop: 8, fontSize: 11, color: '#8b949e' }}>
                            Resistance: <span style={{ color: '#e74c3c' }}>{plasmidMap.backbone_resistance}</span>
                            {' | Ori: '}<span style={{ color: '#3498db' }}>{plasmidMap.backbone_ori}</span>
                        </div>
                    )}
                </div>
            </div>
        </div>
    );
}

// --- Cost comparison bar chart ---
function CostChart({ strategies }) {
    if (!strategies.length) return null;
    const maxCost = Math.max(...strategies.map(s => s.total_cost));

    return (
        <div style={{ marginTop: 16 }}>
            {strategies.map((s, i) => {
                const pct = (s.total_cost / maxCost) * 100;
                const isRec = s.recommended;
                return (
                    <div key={i} style={{ marginBottom: 14 }}>
                        <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 4 }}>
                            <span style={{ fontSize: 13, fontWeight: isRec ? 700 : 400, color: isRec ? '#3fb950' : '#e1e4e8' }}>
                                {s.name} {isRec && ' (recommended)'}
                            </span>
                            <span style={{ fontSize: 13, fontWeight: 600, color: isRec ? '#3fb950' : '#e1e4e8' }}>
                                ${s.total_cost.toLocaleString(undefined, { minimumFractionDigits: 2 })}
                            </span>
                        </div>
                        <div style={{ height: 24, background: '#1c2129', borderRadius: 4, overflow: 'hidden', display: 'flex' }}>
                            <div style={{ width: `${(s.synthesis_cost / maxCost) * 100}%`, background: '#d29922', transition: 'width .4s' }}
                                 title={`Synthesis: $${s.synthesis_cost.toFixed(0)}`} />
                            <div style={{ width: `${(s.researcher_cost / maxCost) * 100}%`, background: '#58a6ff', transition: 'width .4s' }}
                                 title={`Researcher: $${s.researcher_cost.toFixed(0)} (${s.researcher_hours}h)`} />
                            <div style={{ width: `${(s.reagent_cost / maxCost) * 100}%`, background: '#bc8cff', transition: 'width .4s' }}
                                 title={`Reagents: $${s.reagent_cost.toFixed(0)}`} />
                            <div style={{ width: `${(s.risk_surcharge / maxCost) * 100}%`, background: '#f85149', transition: 'width .4s' }}
                                 title={`Risk: $${s.risk_surcharge.toFixed(0)}`} />
                        </div>
                        <div style={{ display: 'flex', gap: 6, marginTop: 3, fontSize: 11, color: '#8b949e' }}>
                            <span>{s.wall_clock_days[0]}-{s.wall_clock_days[1]} days</span>
                            <span>|</span>
                            <span>{s.num_fragments} fragment{s.num_fragments > 1 ? 's' : ''}</span>
                            <span>|</span>
                            <span>{s.researcher_hours}h hands-on</span>
                        </div>
                    </div>
                );
            })}
            <div style={{ display: 'flex', gap: 12, fontSize: 11, color: '#8b949e', marginTop: 8 }}>
                <span><span style={{ display: 'inline-block', width: 10, height: 10, background: '#d29922', borderRadius: 2, marginRight: 4 }}/>Synthesis</span>
                <span><span style={{ display: 'inline-block', width: 10, height: 10, background: '#58a6ff', borderRadius: 2, marginRight: 4 }}/>Researcher</span>
                <span><span style={{ display: 'inline-block', width: 10, height: 10, background: '#bc8cff', borderRadius: 2, marginRight: 4 }}/>Reagents</span>
                <span><span style={{ display: 'inline-block', width: 10, height: 10, background: '#f85149', borderRadius: 2, marginRight: 4 }}/>Risk</span>
            </div>
        </div>
    );
}

// --- Cistron builder row ---
function CistronRow({ cistron, index, onChange, onRemove }) {
    const update = (field, value) => onChange(index, { ...cistron, [field]: value });

    return (
        <div style={{ marginBottom: 10 }}>
            {index > 0 && (
                <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 6, padding: '6px 10px',
                              background: '#161b22', borderRadius: '8px 8px 0 0', border: '1px solid #30363d', borderBottom: 'none' }}>
                    <span style={{ fontSize: 10, color: '#8b949e', textTransform: 'uppercase', letterSpacing: 0.5 }}>Link</span>
                    <select style={{ ...inputStyle, padding: '3px 8px', fontSize: 12, flex: 1 }}
                            value={cistron.upstreamLink || 'spacer'} onChange={e => update('upstreamLink', e.target.value)}>
                        <optgroup label="Prokaryotic">
                            <option value="spacer">Spacer + RBS (default)</option>
                        </optgroup>
                        <optgroup label="2A self-cleaving (mammalian)">
                            <option value="P2A">P2A (highest efficiency)</option>
                            <option value="T2A">T2A</option>
                            <option value="E2A">E2A</option>
                            <option value="F2A">F2A</option>
                        </optgroup>
                    </select>
                </div>
            )}
        <div style={{ background: '#1c2129', borderRadius: index > 0 ? '0 0 8px 8px' : 8, padding: 14, border: '1px solid #30363d' }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 10 }}>
                <span style={{ fontSize: 13, fontWeight: 600, color: '#58a6ff' }}>Cistron {index + 1}: {cistron.label || 'unnamed'}</span>
                <button onClick={() => onRemove(index)}
                        style={{ background: 'none', border: 'none', color: '#f85149', cursor: 'pointer', fontSize: 18 }}>&times;</button>
            </div>

            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 8 }}>
                <label style={labelStyle}>
                    <span style={labelTextStyle}>Label</span>
                    <input style={inputStyle} value={cistron.label} onChange={e => update('label', e.target.value)} placeholder="target" />
                </label>
                <label style={labelStyle}>
                    <span style={labelTextStyle}>Expression</span>
                    <select style={inputStyle} value={cistron.expression} onChange={e => update('expression', e.target.value)}>
                        <option value="high">High</option>
                        <option value="medium">Medium</option>
                        <option value="low">Low</option>
                        <option value="very_low">Very low</option>
                    </select>
                </label>
                <label style={labelStyle}>
                    <span style={labelTextStyle}>Fused</span>
                    <select style={inputStyle} value={cistron.fused ? 'yes' : 'no'} onChange={e => update('fused', e.target.value === 'yes')}>
                        <option value="yes">Yes (fusion)</option>
                        <option value="no">No (independent)</option>
                    </select>
                </label>
            </div>

            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8, marginTop: 8 }}>
                <label style={labelStyle}>
                    <span style={labelTextStyle}>Gene ID</span>
                    <input style={inputStyle} value={cistron.geneId} onChange={e => update('geneId', e.target.value)} placeholder="mEGFP" />
                </label>
                <label style={labelStyle}>
                    <span style={labelTextStyle}>Source</span>
                    <select style={inputStyle} value={cistron.geneSource} onChange={e => update('geneSource', e.target.value)}>
                        <option value="fpbase">FPbase</option>
                        <option value="uniprot">UniProt</option>
                        <option value="local">Local</option>
                    </select>
                </label>
            </div>

            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 8, marginTop: 8 }}>
                <label style={labelStyle}>
                    <span style={labelTextStyle}>N-term tag</span>
                    <select style={inputStyle} value={cistron.nTag} onChange={e => update('nTag', e.target.value)}>
                        <option value="">None</option>
                        <optgroup label="Purification">
                            <option value="6xHis">6xHis</option>
                            <option value="8xHis">8xHis</option>
                            <option value="Strep-II">Strep-II</option>
                            <option value="Twin-Strep">Twin-Strep</option>
                            <option value="FLAG">FLAG</option>
                            <option value="HA">HA</option>
                        </optgroup>
                        <optgroup label="Split GFP">
                            <option value="GFP11">GFP11 (16 aa)</option>
                            <option value="GFP11x3">GFP11×3 tandem</option>
                            <option value="GFP11x7">GFP11×7 array</option>
                        </optgroup>
                    </select>
                </label>
                <label style={labelStyle}>
                    <span style={labelTextStyle}>Cleavage site</span>
                    <select style={inputStyle} value={cistron.cleavage} onChange={e => update('cleavage', e.target.value)}>
                        <option value="">None</option>
                        <option value="TEV">TEV</option>
                        <option value="3C">3C (PreScission)</option>
                        <option value="Thrombin">Thrombin</option>
                        <option value="Factor_Xa">Factor Xa</option>
                    </select>
                </label>
                <label style={labelStyle}>
                    <span style={labelTextStyle}>Solubility tag</span>
                    <select style={inputStyle} value={cistron.solTag} onChange={e => update('solTag', e.target.value)}>
                        <option value="">None</option>
                        <option value="MBP">MBP</option>
                        <option value="GST">GST</option>
                        <option value="SUMO">SUMO</option>
                        <option value="Trx">Trx</option>
                    </select>
                </label>
            </div>

            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8, marginTop: 8 }}>
                <label style={labelStyle}>
                    <span style={labelTextStyle}>Linker</span>
                    <select style={inputStyle} value={cistron.linker || ''} onChange={e => update('linker', e.target.value)}>
                        <option value="">None</option>
                        <optgroup label="Flexible">
                            <option value="GS_flexible">(GGGGS)n flexible</option>
                            <option value="short_GS">GS minimal</option>
                            <option value="SEG">(SGGSGGS)n</option>
                            <option value="FL2x">FL2x (natural)</option>
                        </optgroup>
                        <optgroup label="Rigid / helical">
                            <option value="rigid_EAAAK">(EAAAK)n rigid</option>
                            <option value="rigid_EAAAK_capped">A(EAAAK)4A capped</option>
                            <option value="proline_rich">(AP)n proline-rich</option>
                        </optgroup>
                        <optgroup label="Unstructured (long)">
                            <option value="XTEN_40">XTEN-40 (40 aa)</option>
                            <option value="XTEN_80">XTEN-80 (80 aa)</option>
                        </optgroup>
                    </select>
                </label>
                {cistron.linker && (
                    <label style={labelStyle}>
                        <span style={labelTextStyle}>Linker repeats</span>
                        <select style={inputStyle} value={cistron.linkerRepeats || 3} onChange={e => update('linkerRepeats', parseInt(e.target.value))}>
                            <option value="1">1×</option>
                            <option value="2">2×</option>
                            <option value="3">3× (default)</option>
                            <option value="4">4×</option>
                            <option value="5">5×</option>
                            <option value="6">6×</option>
                        </select>
                    </label>
                )}
            </div>
        </div>
        </div>
    );
}

const VECTOR_CATEGORIES = [
    { label: 'E. coli Expression', filter: v => v.category === 'ecoli_expression' },
    { label: 'Mammalian Expression', filter: v => v.category === 'mammalian_expression' },

// --- Main App ---
function App() {
    const [constructName, setConstructName] = useState('My-Construct');
    const [host, setHost] = useState('e_coli_bl21');
    const [promoter, setPromoter] = useState('T7lac');
    const [terminator, setTerminator] = useState('rrnB_T1');
    const [resistance, setResistance] = useState('kanamycin');
    const [ori, setOri] = useState('pBR322');
    const [enzyme, setEnzyme] = useState('BsaI');
    // Cost parameters (all configurable)
    const [costParams, setCostParams] = useState({
        researcher_hourly_rate: 150,
        overhead_multiplier: 1.5,
        // Synthesis
        twist_gene_per_bp: 0.07,
        twist_clonal_per_bp: 0.09,
        idt_gblock_per_bp: 0.08,
        // Reagents
        bsai_per_reaction: 3.00,
        t4_ligase_per_reaction: 0.25,
        competent_cells_per_transformation: 10.00,
        plates_antibiotics: 2.00,
        colony_pcr_screening: 5.00,
        miniprep: 5.00,
        plasmidsaurus_sequencing: 15.00,
        // Labor
        golden_gate_setup_hrs: 1.5,
        colony_screening_hrs: 0.0,
        miniprep_sequencing_hrs: 1.0,
        troubleshooting_hrs: 3.0,
        // Success rates
        two_part_success_rate: 0.90,
        three_part_success_rate: 0.80,
    });
    const [showAdvancedCosts, setShowAdvancedCosts] = useState(false);
    const updateCost = (key, val) => setCostParams(prev => ({ ...prev, [key]: +val }));

    // Catalog vector state
    const [useCatalog, setUseCatalog] = useState(false);
    const [catalogVector, setCatalogVector] = useState('');

    const handleCatalogChange = (vectorId) => {
        setCatalogVector(vectorId);
        if (vectorId && CATALOG_VECTORS[vectorId]) {
            const v = CATALOG_VECTORS[vectorId];
            if (v.promoter) setPromoter(v.promoter);
            if (v.resistance) setResistance(v.resistance);
            if (v.ori) setOri(v.ori);
            // Set host for mammalian/lentiviral vectors
            if (v.host === 'mammalian') setHost('mammalian');
            else if (v.host === 'e_coli_bl21') setHost('e_coli_bl21');
            else if (v.host === 'e_coli') setHost('e_coli_bl21');
        }
    };

    const catalogProvides = useCatalog && catalogVector && CATALOG_VECTORS[catalogVector]
        ? new Set(CATALOG_VECTORS[catalogVector].provides)
        : new Set();

    const [cistrons, setCistrons] = useState([
        { label: 'target', expression: 'high', fused: true, geneId: 'mEGFP', geneSource: 'fpbase',
          nTag: '6xHis', cleavage: 'TEV', solTag: 'MBP', linker: '', linkerRepeats: 3 },
    ]);

    const [result, setResult] = useState(null);
    const [loading, setLoading] = useState(false);
    const [error, setError] = useState('');
    const [activeTab, setActiveTab] = useState('map');
    const [checkResult, setCheckResult] = useState(null);
    const [checkLoading, setCheckLoading] = useState(false);

    const addCistron = () => {
        setCistrons([...cistrons, {
            label: `cistron_${cistrons.length + 1}`, expression: 'low', fused: false,
            geneId: 'mScarlet', geneSource: 'fpbase', nTag: '', cleavage: '', solTag: '',
            linker: '', linkerRepeats: 3, upstreamLink: 'spacer',
        }]);
    };

    const updateCistron = (index, updated) => {
        const next = [...cistrons];
        next[index] = updated;
        setCistrons(next);
    };

    const removeCistron = (index) => {
        setCistrons(cistrons.filter((_, i) => i !== index));
    };

    const buildSpec = () => {
        const cassette = [{ promoter }];

        cistrons.forEach((c, i) => {
            if (i > 0) {
                const link = c.upstreamLink || 'spacer';
                if (link === 'spacer') {
                    cassette.push({ spacer: 30 });
                } else if (['P2A', 'T2A', 'E2A', 'F2A'].includes(link)) {
                    cassette.push({ self_cleaving_2a: link });
                }
            }

            const chain = [];
            if (c.nTag) chain.push({ tag: c.nTag });
            if (c.cleavage) chain.push({ cleavage_site: c.cleavage });
            if (c.solTag) chain.push({ solubility_tag: c.solTag });
            if (c.linker) chain.push({ linker: { type: c.linker, repeats: c.linkerRepeats || 3 } });
            chain.push({ gene: { id: c.geneId, source: c.geneSource } });

            cassette.push({
                cistron: {
                    label: c.label,
                    expression: c.expression,
                    fused: c.fused,
                    ...(chain.length > 1 ? { chain } : { gene: { id: c.geneId, source: c.geneSource } }),
                }
            });
        });

        cassette.push({ terminator });

        const backbone = useCatalog && catalogVector
            ? { catalog_vector: catalogVector }
            : { resistance, ori, source: 'addgene' };

        return {
            construct: {
                name: constructName,
                host,
                backbone,
                cassette,
                constraints: { assembly: 'golden_gate', enzyme, codon_optimization: 'local' },
                synthesis: { vendor: 'twist' },
            }
        };
    };

    const handleCompile = async () => {
        setLoading(true);
        setError('');
        setResult(null);

        const spec = buildSpec();

        try {
            const resp = await fetch('/api/compile', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    spec,
                    cost_params: costParams,
                }),
            });
            const data = await resp.json();
            if (data.success) {
                setResult(data);
                setActiveTab('map');
            } else {
                setError(data.errors?.join('; ') || 'Compilation failed');
            }
        } catch (e) {
            setError(`Server error: ${e.message}. Is the server running? (python -m construct_compiler.server)`);
        }
        setLoading(false);
    };

    const handleCheck = async () => {
        setCheckLoading(true);
        setCheckResult(null);
        const spec = buildSpec();
        try {
            const resp = await fetch('/api/check', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ spec }),
            });
            const data = await resp.json();
            setCheckResult(data);
            setActiveTab('validation');
        } catch (e) {
            setCheckResult({ success: false, errors: [`Server error: ${e.message}`] });
            setActiveTab('validation');
        }
        setCheckLoading(false);
    };

    const downloadGenbank = () => {
        if (!result?.genbank) return;
        const blob = new Blob([result.genbank], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = `${result.construct_name || 'construct'}.gb`;
        a.click(); URL.revokeObjectURL(url);
    };

    const downloadYaml = () => {
        const spec = buildSpec();
        // Simple YAML serialization (good enough for this structure)
        const yaml = JSON.stringify(spec, null, 2)
            .replace(/"/g, '').replace(/\{/g, '').replace(/\}/g, '')
            .replace(/\[/g, '').replace(/\]/g, '').replace(/,$/gm, '');
        const blob = new Blob([JSON.stringify(spec, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = `${constructName || 'construct'}_spec.json`;
        a.click(); URL.revokeObjectURL(url);
    };

    return (
        <div style={{ minHeight: '100vh', background: 'var(--bg)' }}>
            {/* Header */}
            <header style={{ background: '#161b22', borderBottom: '1px solid #30363d', padding: '12px 24px', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                    <span style={{ fontSize: 20 }}>&#x1F9EC;</span>
                    <span style={{ fontSize: 16, fontWeight: 700, color: '#e1e4e8' }}>Construct Compiler</span>
                    <span style={{ fontSize: 12, color: '#8b949e', marginLeft: 4 }}>v0.1.0</span>
                </div>
                <div style={{ display: 'flex', gap: 8 }}>
                    <button onClick={downloadYaml} style={{ ...btnStyle, background: '#21262d', color: '#e1e4e8' }}>
                        Export Spec
                    </button>
                    {result && (
                        <button onClick={downloadGenbank} style={{ ...btnStyle, background: '#238636', color: '#fff' }}>
                            Download GenBank
                        </button>
                    )}
                </div>
            </header>

            <div style={{ display: 'grid', gridTemplateColumns: '420px 1fr', minHeight: 'calc(100vh - 49px)' }}>
                {/* Left panel: construct builder */}
                <div style={{ borderRight: '1px solid #30363d', padding: 20, overflowY: 'auto', maxHeight: 'calc(100vh - 49px)' }}>
                    <h3 style={{ fontSize: 14, color: '#8b949e', textTransform: 'uppercase', letterSpacing: 1, marginBottom: 12 }}>Construct</h3>

                    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8, marginBottom: 12 }}>
                        <label style={{ ...labelStyle, gridColumn: '1 / -1' }}>
                            <span style={labelTextStyle}>Name</span>
                            <input style={inputStyle} value={constructName} onChange={e => setConstructName(e.target.value)} />
                        </label>
                        <label style={labelStyle}>
                            <span style={labelTextStyle}>Host</span>
                            <select style={inputStyle} value={host} onChange={e => setHost(e.target.value)}>
                                <optgroup label="Prokaryotic">
                                    <option value="e_coli_bl21">E. coli BL21(DE3)</option>
                                    <option value="e_coli">E. coli K-12</option>
                                </optgroup>
                                <optgroup label="Eukaryotic">
                                    <option value="mammalian">Mammalian (HEK293, CHO, etc.)</option>
                                    <option value="s_cerevisiae">S. cerevisiae</option>
                                </optgroup>
                            </select>
                        </label>
                    </div>

                    {/* Backbone mode toggle */}
                    <div style={{ display: 'flex', gap: 4, marginBottom: 12 }}>
                        <button onClick={() => { setUseCatalog(false); setCatalogVector(''); }}
                                style={{ ...btnStyle, flex: 1, background: !useCatalog ? '#238636' : '#21262d',
                                         color: !useCatalog ? '#fff' : '#8b949e', fontSize: 11, padding: '5px 8px' }}>
                            Custom Backbone

                                                    <table style={{ width: '100%', fontSize: 13, borderCollapse: 'collapse' }}>
                                                        <tbody>
                                                            <tr><td style={{ padding: '4px 0', color: '#8b949e' }}>Synthesis</td><td style={{ textAlign: 'right' }}>${strat.synthesis_cost.toFixed(2)}</td></tr>
                                                            <tr><td style={{ padding: '4px 0', color: '#8b949e' }}>Reagents</td><td style={{ textAlign: 'right' }}>${strat.reagent_cost.toFixed(2)}</td></tr>
                                                            <tr><td style={{ padding: '4px 0', color: '#8b949e' }}>Researcher ({strat.researcher_hours}h)</td><td style={{ textAlign: 'right' }}>${strat.researcher_cost.toFixed(2)}</td></tr>
                                                            <tr><td style={{ padding: '4px 0', color: '#8b949e' }}>Failure risk</td><td style={{ textAlign: 'right' }}>${strat.risk_surcharge.toFixed(2)}</td></tr>
                                                            <tr style={{ borderTop: '1px solid #30363d' }}><td style={{ padding: '8px 0', fontWeight: 700, color: isRec ? '#3fb950' : '#e1e4e8' }}>Total</td><td style={{ textAlign: 'right', fontWeight: 700, color: isRec ? '#3fb950' : '#e1e4e8' }}>${strat.total_cost.toFixed(2)}</td></tr>
                                                        </tbody>
                                                    </table>
                                                )}
                                                <div style={{ marginTop: 8, fontSize: 11, color: '#8b949e' }}>
                                                    {strat.wall_clock_days[0]}-{strat.wall_clock_days[1]} business days | {strat.num_fragments} fragment(s)
                                                    {strat.researcher_hours > 0 && ` | ${strat.researcher_hours}h hands-on`}
                                                    {strat.overhangs.length > 0 && ` | Overhangs: ${strat.overhangs.join(' / ')}`}
                                                </div>
                                                {strat.notes.map((n, i) => <div key={i} style={{ marginTop: 3, fontSize: 11, color: '#8b949e' }}>{n}</div>)}
                                            </div>
                                        );
                                    })}
                                </div>
                            )}

                            {/* Parts tab */}
                            {activeTab === 'parts' && result && (
                                <div>
                                    <h3 style={{ fontSize: 16, marginBottom: 16, color: '#e1e4e8' }}>Parts List</h3>
                                    <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 13 }}>
                                        <thead>
                                            <tr style={{ borderBottom: '1px solid #30363d' }}>
                                                <th style={{ textAlign: 'left', padding: '8px 6px', color: '#8b949e' }}></th>
                                                <th style={{ textAlign: 'left', padding: '8px 6px', color: '#8b949e' }}>Name</th>
                                                <th style={{ textAlign: 'left', padding: '8px 6px', color: '#8b949e' }}>Type</th>
                                                <th style={{ textAlign: 'right', padding: '8px 6px', color: '#8b949e' }}>Length</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {result.parts.map((p, i) => (
                                                <tr key={i} style={{ borderBottom: '1px solid #1c2129' }}>
                                                    <td style={{ padding: '6px' }}>
                                                        <div style={{ width: 12, height: 12, borderRadius: 3, background: p.color || PART_COLORS[p.type] || '#666' }} />
                                                    </td>
                                                    <td style={{ padding: '6px', fontWeight: 500 }}>{p.name}</td>
                                                    <td style={{ padding: '6px', color: '#8b949e' }}>{p.type}</td>
                                                    <td style={{ padding: '6px', textAlign: 'right', fontFamily: 'monospace' }}>{p.length_bp ? `${p.length_bp} bp` : '-'}</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            )}

                            {/* GenBank tab */}
                            {activeTab === 'genbank' && result && (
                                <div>
                                    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>
                                        <h3 style={{ fontSize: 16, color: '#e1e4e8' }}>GenBank Output</h3>
                                        <button onClick={downloadGenbank} style={{ ...btnStyle, background: '#238636', color: '#fff' }}>Download .gb</button>
                                    </div>
                                    <pre style={{
                                        background: '#0d1117', border: '1px solid #30363d', borderRadius: 8,
                                        padding: 16, fontSize: 11, fontFamily: 'SF Mono, Menlo, monospace',
                                        color: '#8b949e', overflow: 'auto', maxHeight: '60vh', whiteSpace: 'pre',
                                        lineHeight: 1.5,
                                    }}>
                                        {result.genbank || 'No GenBank output generated.'}
                                    </pre>
                                </div>
                            )}
                        </div>
                    )}
                </div>
            </div>
        </div>
    );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
